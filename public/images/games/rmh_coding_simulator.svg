<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900" role="img" aria-label="RMH Coding Simulator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="0.55" stop-color="#0e1626"/>
      <stop offset="1" stop-color="#06262a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ddc84"/>
      <stop offset="1" stop-color="#46d6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.18" r="0.8">
      <stop offset="0" stop-color="#3ddc84" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3ddc84" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#1c2940" stroke-width="1" opacity="0.6">
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="750" x2="600" y2="750"/>
    <line x1="150" y1="0" x2="150" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="450" y1="0" x2="450" y2="900"/>
  </g>

  <!-- editor window -->
  <g>
    <rect x="70" y="250" width="460" height="330" rx="18" fill="#121826" stroke="#243044" stroke-width="2"/>
    <rect x="70" y="250" width="460" height="46" rx="18" fill="#161e2e"/>
    <rect x="70" y="280" width="460" height="16" fill="#161e2e"/>
    <circle cx="100" cy="273" r="7" fill="#ff6b6b"/>
    <circle cx="124" cy="273" r="7" fill="#ffd23f"/>
    <circle cx="148" cy="273" r="7" fill="#3ddc84"/>
    <text x="300" y="278" font-family="ui-monospace, monospace" font-size="15" fill="#7a869c" text-anchor="middle">studio.ts</text>

    <!-- code lines -->
    <g font-family="ui-monospace, monospace" font-size="17">
      <text x="100" y="340" fill="#b794f6">function <tspan fill="#46d6ff">ship</tspan>() {</text>
      <text x="125" y="372" fill="#7a869c">// write the code</text>
      <text x="125" y="404" fill="#cdd6e4">loc <tspan fill="#3ddc84">+=</tspan> click();</text>
      <text x="125" y="436" fill="#cdd6e4">hire(<tspan fill="#ffd23f">'AI Copilot'</tspan>);</text>
      <text x="125" y="468" fill="#3ddc84">return <tspan fill="#46d6ff">'🚀'</tspan>;</text>
      <text x="100" y="500" fill="#b794f6">}</text>
      <rect x="100" y="520" width="14" height="22" fill="#3ddc84">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- big glyph -->
  <text x="300" y="190" font-size="120" text-anchor="middle" filter="url(#soft)" opacity="0.9">⌨️</text>
  <text x="300" y="190" font-size="120" text-anchor="middle">⌨️</text>

  <!-- title -->
  <text x="300" y="690" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="800" text-anchor="middle" fill="url(#accent)">RMH</text>
  <text x="300" y="748" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="800" text-anchor="middle" fill="#cdd6e4">CODING SIMULATOR</text>

  <!-- tagline / tags -->
  <text x="300" y="800" font-family="ui-monospace, monospace" font-size="18" text-anchor="middle" fill="#7a869c">idle · clicker · prestige · AI</text>

  <g font-family="ui-monospace, monospace" font-size="16" fill="#0b0f17">
    <rect x="170" y="828" width="120" height="34" rx="17" fill="#3ddc84"/>
    <text x="230" y="851" text-anchor="middle">git commit</text>
    <rect x="310" y="828" width="120" height="34" rx="17" fill="#46d6ff"/>
    <text x="370" y="851" text-anchor="middle">ship it 🚀</text>
  </g>
</svg>
