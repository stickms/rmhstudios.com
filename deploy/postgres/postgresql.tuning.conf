# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL tuning for rmhstudios.com (perf audit §1.4).
#
# WHY: Postgres runs on the VPS host (reached from the containers via
# host.docker.internal) with STOCK configuration — shared_buffers 128MB,
# work_mem 4MB, effective_cache_size 4GB. Under the feed workload that thrashes:
# the working set doesn't fit in shared_buffers, sorts/hashes spill to disk, and
# the planner under-estimates how much OS cache is available. Combined with the
# small connection pool this is a major "slow under load" contributor.
#
# These are STARTING VALUES for a VPS with ~8 GB RAM shared with the app
# containers. TUNE to the box: shared_buffers ≈ 25% RAM, effective_cache_size ≈
# 50–75% RAM. If the host has more/less memory, scale proportionally. Verify the
# app-tier connection budget (web pool + hub pools + workers + Go fleet) stays
# under max_connections with headroom; add PgBouncer (transaction pooling) if the
# fleet grows past it.
#
# HOW TO APPLY (on the VPS host, NOT a container):
#   sudo cp deploy/postgres/postgresql.tuning.conf \
#           /etc/postgresql/*/main/conf.d/rmhstudios-tuning.conf
#   sudo systemctl restart postgresql     # shared_buffers/max_connections need a restart
# Confirm: `SHOW shared_buffers;` `SHOW max_connections;` and watch
# `SELECT count(*) FROM pg_stat_activity;` against max_connections under load.
# ─────────────────────────────────────────────────────────────────────────────

# ── Memory ──
shared_buffers = 2GB                 # ~25% of 8GB
effective_cache_size = 5GB           # planner hint: OS + PG cache available
work_mem = 16MB                      # per sort/hash node; keep modest — many
                                     # concurrent connections each can use several
maintenance_work_mem = 512MB         # index builds / VACUUM
huge_pages = try

# ── Connections ──
# Must exceed the whole fleet's pool budget with headroom (perf audit §2/§4):
# web DATABASE_POOL_SIZE + each hub's Prisma + raw auth pool + workers + Go pgx.
# Raise here rather than starving the app; use PgBouncer if you need many more.
max_connections = 200

# ── Query planner (SSD-backed VPS) ──
random_page_cost = 1.1               # SSD: random reads ≈ sequential
effective_io_concurrency = 200

# ── Write / checkpoint smoothing ──
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9
default_statistics_target = 100

# ── Parallelism ──
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8

# ── Observability (find the slow queries the audit points at) ──
# Requires: shared_preload_libraries = 'pg_stat_statements' (needs a restart) and
# `CREATE EXTENSION pg_stat_statements;` once. Uncomment to enable.
# shared_preload_libraries = 'pg_stat_statements'
# pg_stat_statements.track = top
log_min_duration_statement = 500ms   # log any statement slower than 500ms
