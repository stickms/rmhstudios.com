# ─────────────────────────────────────────────────────────────────────────────
# Apache vhost for status.rmhstudios.com (production VPS).
#
# Source-of-truth copy. The live file is /etc/apache2/sites-available/
# status.rmhstudios.com.conf on the VPS — keep them in sync. TLS is terminated
# by Cloudflare, so Apache listens on :80 only.
#
# This is a separate, self-contained status dashboard served by the `status`
# Docker service (see docker-compose.yml + server/status/). It probes every
# other service and renders its own health page, so it stays up even when the
# main web app is down — which is exactly when you want a status page.
#
# Install:
#   sudo cp deploy/apache/status.rmhstudios.com.conf \
#           /etc/apache2/sites-available/status.rmhstudios.com.conf
#   sudo a2ensite status.rmhstudios.com
#   sudo apachectl configtest && sudo systemctl reload apache2
#
# Required modules (already enabled for the main vhost):
#   proxy proxy_http headers
#
# DNS: add an A/CNAME record for status.rmhstudios.com pointing at the same
# Cloudflare-proxied origin as rmhstudios.com.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream port for the status service (docker-compose `status`, published on
# 127.0.0.1). Overridable, falls back to the default 7008.
<IfDefine !STATUS_UPSTREAM_PORT>
    Define STATUS_UPSTREAM_PORT 7008
</IfDefine>

<VirtualHost *:80>
    ServerName status.rmhstudios.com

    # ── Security headers (defense-in-depth) ──
    # TLS is terminated at Cloudflare; these are forwarded to the client.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Permitted-Cross-Domain-Policies "none"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"

    # ── Proxy everything to the status service ──
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://localhost:${STATUS_UPSTREAM_PORT}/
    ProxyPassReverse / http://localhost:${STATUS_UPSTREAM_PORT}/

    ErrorLog  ${APACHE_LOG_DIR}/status.rmhstudios.log
    CustomLog ${APACHE_LOG_DIR}/status.rmhstudios.log combined
</VirtualHost>
