# ─────────────────────────────────────────────────────────────────────────────
# Canonical Apache vhost for rmhstudios.com (production VPS).
#
# This is the source-of-truth copy (deploy/apache/rmhstudios.conf). The live file
# is /etc/apache2/sites-available/rmhstudios.conf on the VPS — keep them in sync.
# (If the live vhost is still named rmhstudios.com.conf, rename it with
#  `sudo a2dissite rmhstudios.com && sudo mv ... rmhstudios.conf && sudo a2ensite
#  rmhstudios && sudo systemctl reload apache2`.) TLS is terminated by
# Cloudflare, so Apache listens on :80 only and serves the Cloudflare-proxied
# origin over HTTP.
#
# Static assets (book PDFs, game music, 3D models, sprite sheets) are no longer
# served off disk here — they live in Cloudflare R2 behind cdn.rmhstudios.com
# (see lib/storage/asset.ts and scripts/sync-static-assets-to-r2.mjs). Apache
# just reverse-proxies everything to the Node app now.
#
# Required modules: proxy proxy_http proxy_wstunnel headers remoteip
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers remoteip
# (remoteip is used by the client-IP trust boundary block below; see its note.)
# Validate before reloading:
#   sudo apachectl configtest && sudo systemctl reload apache2
# ─────────────────────────────────────────────────────────────────────────────
# Zero-downtime web upstream port. deploy/hotswap-web.sh writes the active port
# into the optional include below; a root-owned systemd path-unit watching the
# file then runs `apachectl graceful` to flip traffic between blue/green web
# containers without dropping connections. If the include is absent, we fall back
# to the default port.
#
# CRITICAL: this path MUST match ACTIVE_CONF in deploy/hotswap-web.sh. The webhook
# that runs the deploy is sandboxed (ProtectSystem=strict + NoNewPrivileges) and
# CANNOT write under /etc, so the active-port file lives in the deploy user's home
# (which is in the webhook unit's ReadWritePaths). Apache's master process runs as
# root and can read it there. Pointing this include at /etc/... instead means the
# deploy writes the home file while Apache keeps reading the stale /etc file — the
# port flip never lands and every route 503s the moment the old container stops.
IncludeOptional /home/rmhstudios/rmhstudios-web-active.conf
<IfDefine !WEB_UPSTREAM_PORT>
    Define WEB_UPSTREAM_PORT 7005
</IfDefine>

<VirtualHost *:80>
    ServerName rmhstudios.com

    # ── Client IP trust boundary (rate-limit correctness; H-5) ──
    # The app rate-limits by client IP (lib rateLimit(getClientIp(request), …)).
    # That IP is only trustworthy if a client cannot spoof it, which requires
    # BOTH of the following — the second is enforced here, the first is an
    # infrastructure requirement that MUST hold for this to be safe:
    #
    #   1. NETWORK: this origin MUST be firewalled so ONLY Cloudflare's published
    #      IP ranges (https://www.cloudflare.com/ips/) can reach Apache on :80.
    #      If the origin is reachable directly, an attacker bypasses Cloudflare
    #      and can forge CF-Connecting-IP / X-Forwarded-For at will. Do NOT rely
    #      on Apache alone for this — enforce it at the host/cloud firewall.
    #   2. HEADER: CF-Connecting-IP (set by Cloudflare) carries the real client
    #      IP. It must ONLY be trusted when the request actually arrived FROM a
    #      Cloudflare edge. mod_remoteip below rewrites the connection's client
    #      IP from CF-Connecting-IP ONLY for peers in the trusted-proxy list and
    #      ignores the header from any other source, so a direct client cannot
    #      spoof it.
    #
    # Enable the module first: `sudo a2enmod remoteip`. The block is wrapped in
    # <IfModule> so `apachectl configtest` still passes if the module is not yet
    # enabled (the directives simply no-op until it is). Keep the trusted-proxy
    # list in sync with https://www.cloudflare.com/ips/.
    <IfModule mod_remoteip.c>
        RemoteIPHeader CF-Connecting-IP
        # Cloudflare IPv4 ranges
        RemoteIPTrustedProxy 173.245.48.0/20
        RemoteIPTrustedProxy 103.21.244.0/22
        RemoteIPTrustedProxy 103.22.200.0/22
        RemoteIPTrustedProxy 103.31.4.0/22
        RemoteIPTrustedProxy 141.101.64.0/18
        RemoteIPTrustedProxy 108.162.192.0/18
        RemoteIPTrustedProxy 190.93.240.0/20
        RemoteIPTrustedProxy 188.114.96.0/20
        RemoteIPTrustedProxy 197.234.240.0/22
        RemoteIPTrustedProxy 198.41.128.0/17
        RemoteIPTrustedProxy 162.158.0.0/15
        RemoteIPTrustedProxy 104.16.0.0/13
        RemoteIPTrustedProxy 104.24.0.0/14
        RemoteIPTrustedProxy 172.64.0.0/13
        RemoteIPTrustedProxy 131.0.72.0/22
        # Cloudflare IPv6 ranges
        RemoteIPTrustedProxy 2400:cb00::/32
        RemoteIPTrustedProxy 2606:4700::/32
        RemoteIPTrustedProxy 2803:f800::/32
        RemoteIPTrustedProxy 2405:b500::/32
        RemoteIPTrustedProxy 2405:8100::/32
        RemoteIPTrustedProxy 2a06:98c0::/29
        RemoteIPTrustedProxy 2c0f:f248::/32
    </IfModule>

    # ── Security headers (defense-in-depth) ──
    # TLS is terminated at Cloudflare; these are forwarded to the client.
    # NOTE: we intentionally do NOT send X-Frame-Options because the site is
    # embedded as a Discord Activity. Clickjacking is instead controlled via the
    # CSP frame-ancestors directive below, which allowlists Discord's origins.
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Permitted-Cross-Domain-Policies "none"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"
    # Full enforced policy. Inline bootstrap/style support remains temporarily
    # for TanStack hydration and theme bootstrapping; eval is never permitted.
    #
    # CSP tightening (audit §7.6). connect-src and frame-src were broad `https:`
    # (any HTTPS host = free exfiltration if an injection ever lands); they are
    # now explicit allowlists:
    #   • connect-src (the main exfil vector — fetch/XHR/WebSocket/SSE): 'self'
    #     covers the same-origin API, SSE feed stream, and the socket.io/WS hubs
    #     (proxied on this host, and same-origin via the Discord Activity proxy).
    #     Plus cdn.rmhstudios.com (R2 — game models/audio are fetch()'d, not just
    #     <img>), Discord (embedded-app SDK edge cases), and Spotify (rmhmusic
    #     Web Playback control). The old `https: wss:` wildcards are gone.
    #   • frame-src: rmhtube embeds YouTube + Twitch, rmhmusic embeds Spotify,
    #     plus Discord — enumerated instead of any-HTTPS. `blob:` kept.
    # NOT tightened, on purpose:
    #   • img-src stays `https:` — users post arbitrary direct image/GIF URLs
    #     (Tenor/Giphy/any host, lib/rmhark-schema.ts) and OAuth avatars come
    #     from many hosts; an allowlist would drop legitimate user content.
    #   • media-src stays `https:` — rmhtube plays arbitrary direct video URLs.
    #   • script-src keeps 'unsafe-inline' — removing it needs nonces/hashes for
    #     the TanStack hydration + theme bootstrap inline scripts (out of scope).
    # BYTE-IDENTICAL to deploy/helm/.../security-headers-middleware.yaml.
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://cdn.rmhstudios.com https://discord.com https://*.discord.com https://*.discordsays.com https://*.spotify.com wss://*.spotify.com https://*.scdn.co; media-src 'self' blob: https:; worker-src 'self' blob:; frame-src 'self' blob: https://www.youtube.com https://www.youtube-nocookie.com https://player.twitch.tv https://clips.twitch.tv https://open.spotify.com https://discord.com https://*.discordsays.com; frame-ancestors 'self' https://discord.com https://*.discord.com https://*.discordsays.com; form-action 'self'; object-src 'none'; base-uri 'none'"

    # ── Request body cap (audit §5.2; security M-5) ──
    # Global backstop so a single request can't buffer an unbounded body (~150 API
    # routes call request.json() with no size guard, and upload routes buffer the
    # whole file before their own size check). Sized ABOVE the largest legitimate
    # upload — the admin album upload permits 1 GB per video file
    # (app/routes/api/admin/albums/$id/slides.ts) — so real uploads keep working
    # while multi-GB abuse bodies are rejected. 1610612736 = 1.5 GB (kept under the
    # 2^31 LimitRequestBody ceiling for portability). This is deliberately loose;
    # tighten with per-path <Location> caps (most JSON endpoints need only a few
    # MB) once the large-upload admin routes are separated from the rest.
    LimitRequestBody 1610612736

    # ── Response compression (audit §5.2) ──
    # gzip text-like PROXIED responses to shrink the origin→Cloudflare hop.
    # mod_deflate skips anything already carrying a Content-Encoding (e.g. the
    # app's pre-compressed static assets) and emits `Vary: Accept-Encoding`, so it
    # is safe to apply broadly. Binary/already-compressed types (images, video,
    # fonts) are intentionally omitted. Brotli to END USERS is done at Cloudflare's
    # edge; origin brotli (mod_brotli) is left off to avoid double-compression.
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/html text/plain text/css text/xml \
            text/javascript application/javascript application/x-javascript \
            application/json application/ld+json application/manifest+json \
            application/xml application/rss+xml application/atom+xml \
            image/svg+xml
    </IfModule>

    # ── HTTP/2 (intentionally NOT enabled here) ──
    # This origin vhost is plaintext :80 behind Cloudflare, and Cloudflare speaks
    # HTTP/1.1 to origins by default — h2c is not negotiated — so a
    # `Protocols h2 http/1.1` here would add cleartext HTTP/2 that nothing uses
    # (no benefit, some client-edge risk). End users already get HTTP/2 and HTTP/3
    # from Cloudflare's edge. Revisit only if the origin is ever fronted with TLS
    # + ALPN. Left unset by design.

    # /library (bookshelf index + reader), /music, /models and /sprites are now
    # plain app routes / R2-hosted assets — nothing special to carve out. They
    # fall through to the catch-all proxy below.

    # ── Public health endpoints (status page) ──
    # The status service (status.rmhstudios.com) probes each realtime service
    # through this PUBLIC path so the dashboard reflects real user reachability
    # (Cloudflare → Apache → service), not just internal container health. Each
    # rule rewrites the public /<prefix>/health path to the service's root
    # /health (which both the Node and Go implementations serve). These MUST come
    # before the matching /<prefix>/ WebSocket rules — Apache evaluates ProxyPass
    # in order, so the more specific health path has to win first.
    ProxyPass /socket/health     http://localhost:7001/health
    ProxyPass /rmhbox-ws/health  http://localhost:7676/health
    ProxyPass /rmhtube-ws/health http://localhost:7003/health

    # ── WebSocket + HTTP upstreams (unchanged) ──
    ProxyPass /socket/ http://localhost:7001/socket/ upgrade=websocket
    ProxyPassReverse /socket/ http://localhost:7001/socket/

    ProxyPass /rmhbox-ws/ http://localhost:7676/rmhbox-ws/ upgrade=websocket
    ProxyPassReverse /rmhbox-ws/ http://localhost:7676/rmhbox-ws/

    ProxyPass /rmhtube-ws/ http://localhost:7003/rmhtube-ws/ upgrade=websocket
    ProxyPassReverse /rmhtube-ws/ http://localhost:7003/rmhtube-ws/

    ProxyPass        /webhook http://localhost:7002/webhook
    ProxyPassReverse /webhook http://localhost:7002/webhook

    # ── Proxy inactivity timeout (perf audit §1.3) ──
    # Default ProxyTimeout inherits Timeout (60s). The feed/messages SSE streams
    # and the socket.io/WS hubs are long-lived proxied connections that hold a
    # worker for their lifetime; 60s of inactivity would drop an otherwise-healthy
    # stream. 300s comfortably exceeds every heartbeat/ping interval (SSE ticks and
    # socket.io ping are ≤30s) while still capping how long a genuinely hung
    # backend can pin a worker. Pair with the raised MaxRequestWorkers in
    # deploy/apache/mpm_event.conf so long streams can't starve the worker pool.
    ProxyTimeout 300

    # Everything else → app (port flipped by deploy/hotswap-web.sh for hotswaps)
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://localhost:${WEB_UPSTREAM_PORT}/
    ProxyPassReverse / http://localhost:${WEB_UPSTREAM_PORT}/

    ErrorLog ${APACHE_LOG_DIR}/rmhstudios.log
    CustomLog ${APACHE_LOG_DIR}/rmhstudios.log combined
</VirtualHost>
