# ─────────────────────────────────────────────────────────────────────────────
# Apache event-MPM tuning for rmhstudios.com (perf audit §1.3).
#
# WHY: the origin Apache reverse-proxies every request to the Node tier, and each
# proxied WebSocket (games) and SSE stream (feed / messages / group chats) holds
# ONE worker thread for the connection's entire lifetime (mod_proxy is
# synchronous for upgraded/streamed connections). Debian's stock event MPM caps
# out around MaxRequestWorkers≈400 (ServerLimit 16 × ThreadsPerChild 25). At a
# few hundred concurrent users the long-lived streams exhaust that pool and ALL
# requests — even trivially fast ones — queue behind held slots. That is one of
# the "everything is slow under load" signatures in the audit.
#
# HOW TO APPLY (on the VPS):
#   sudo cp deploy/apache/mpm_event.conf /etc/apache2/conf-available/mpm-tuning.conf
#   sudo a2enmod mpm_event        # ensure event MPM (not prefork) is active
#   sudo a2enconf mpm-tuning
#   sudo apachectl configtest && sudo systemctl reload apache2
# Verify live: `apachectl -M | grep mpm`, and watch busy workers via mod_status.
#
# SIZING: MaxRequestWorkers = ServerLimit × ThreadsPerChild = 24 × 64 = 1536
# worker threads, i.e. up to ~1536 concurrent proxied streams/requests. Threads
# are cheap under event MPM (idle keepalive connections are handled by the async
# listener, not a worker), so the memory cost is modest — but keep an eye on the
# box's RAM headroom (the audit flags the container limits already summing near
# the VPS ceiling). Lower ServerLimit if memory-constrained; raise ThreadsPerChild
# only in tandem so MaxRequestWorkers stays a multiple of ThreadsPerChild.
# ─────────────────────────────────────────────────────────────────────────────
<IfModule mpm_event_module>
    StartServers             4
    ServerLimit              24
    ThreadsPerChild          64
    ThreadLimit              64
    MinSpareThreads          75
    MaxSpareThreads          250
    MaxRequestWorkers        1536
    # 0 = never recycle a child by request count. Long-lived WS/SSE connections
    # must not be torn down mid-stream by a MaxConnectionsPerChild rollover.
    MaxConnectionsPerChild   0
    # Each async listener thread can shepherd more than one keepalive connection;
    # this lets the pool absorb far more idle-but-open connections than the raw
    # worker count, which matters for many open browser tabs holding an SSE feed.
    AsyncRequestWorkerFactor 2
</IfModule>
