# ─────────────────────────────────────────────────────────────────────────────
# Canonical Apache vhost for rmhstudios.com (production VPS).
#
# This is the source-of-truth copy. The live file is /etc/apache2/sites-available/
# rmhstudios.com.conf on the VPS — keep them in sync. TLS is terminated by
# Cloudflare, so Apache listens on :80 only and serves the Cloudflare-proxied
# origin over HTTP.
#
# Self-hosted CDN: the heavy static asset dirs (/library, /music, /models,
# /sprites) are served directly off disk by Apache, bypassing the Node app on
# :7005. Cloudflare caches them at the edge (add a "Cache Everything" rule for
# rmhstudios.com/library/*, /music/*, /models/*, /sprites/*). Deploys re-assert
# the filesystem permissions these Aliases need (see deploy.sh "CDN asset
# permissions" step).
#
# Required modules: proxy proxy_http proxy_wstunnel headers rewrite
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite
# Validate before reloading:
#   sudo apachectl configtest && sudo systemctl reload apache2
# ─────────────────────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName rmhstudios.com

    RewriteEngine On

    # ── Self-hosted CDN: serve heavy assets straight from disk (skip Node) ──
    Alias /library /home/rmhstudios/rmhstudios.com/public/library
    Alias /music   /home/rmhstudios/rmhstudios.com/public/music
    Alias /models  /home/rmhstudios/rmhstudios.com/public/models
    Alias /sprites /home/rmhstudios/rmhstudios.com/public/sprites

    <Directory /home/rmhstudios/rmhstudios.com/public>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None
        # Cache + revalidate; build assets are content-hashed and safe to keep.
        Header set Cache-Control "public, max-age=86400, stale-while-revalidate=604800"
        Header set Accept-Ranges bytes
    </Directory>

    # Exclude the asset paths from the proxy so Apache serves them, not Node.
    # These MUST come before the catch-all "ProxyPass /" below.
    ProxyPass /library !
    ProxyPass /music   !
    ProxyPass /models  !
    ProxyPass /sprites !

    # ── WebSocket + HTTP upstreams (unchanged) ──
    ProxyPass /socket/ http://localhost:7001/socket/ upgrade=websocket
    ProxyPassReverse /socket/ http://localhost:7001/socket/

    ProxyPass /rmhbox-ws/ http://localhost:7676/rmhbox-ws/ upgrade=websocket
    ProxyPassReverse /rmhbox-ws/ http://localhost:7676/rmhbox-ws/

    ProxyPass /rmhtube-ws/ http://localhost:7003/rmhtube-ws/ upgrade=websocket
    ProxyPassReverse /rmhtube-ws/ http://localhost:7003/rmhtube-ws/

    ProxyPass        /webhook http://localhost:7002/webhook
    ProxyPassReverse /webhook http://localhost:7002/webhook

    # Everything else → app
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://localhost:7005/
    ProxyPassReverse / http://localhost:7005/

    ErrorLog ${APACHE_LOG_DIR}/rmhstudios.log
    CustomLog ${APACHE_LOG_DIR}/rmhstudios.log combined
</VirtualHost>
