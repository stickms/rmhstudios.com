{{- if .Values.redis.enabled }}
{{- $root := . -}}
# Realtime backplane (pkg/events). A single in-memory Redis is enough to fan
# room broadcasts across realtime replicas; it holds no durable state, so no PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rmhgo.fullname" $root }}-redis
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: {{ $root.Release.Name }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rmhgo.fullname" $root }}-redis
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
