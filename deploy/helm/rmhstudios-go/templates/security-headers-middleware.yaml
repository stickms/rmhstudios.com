{{- if and .Values.ingress.enabled .Values.ingress.securityHeaders.enabled }}
{{- $root := . -}}
# Traefik response-header middleware so the gateway-fronted (Helm/Traefik) serving
# path emits the same security headers the legacy Apache vhost set
# (deploy/apache/rmhstudios.conf). Referenced from the Ingress via the
# router.middlewares annotation, keeping header policy as code across both paths.
#
# X-Frame-Options is intentionally omitted; clickjacking is controlled by the
# CSP frame-ancestors directive, which allowlists Discord's Activity origins.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "rmhgo.fullname" $root }}-security-headers
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
spec:
  headers:
    contentTypeNosniff: true
    referrerPolicy: "strict-origin-when-cross-origin"
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    contentSecurityPolicy: "frame-ancestors 'self' https://discord.com https://*.discord.com https://*.discordsays.com"
    customResponseHeaders:
      X-Permitted-Cross-Domain-Policies: "none"
      # Report-Only sibling of the enforced CSP above — collect violations for a
      # fuller policy without breaking anything. Mirror of the Apache vhost.
      Content-Security-Policy-Report-Only: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss:; media-src 'self' blob: https:; worker-src 'self' blob:; frame-ancestors 'self' https://discord.com https://*.discord.com https://*.discordsays.com; object-src 'none'; base-uri 'self'"
{{- end }}
