{{- if and .Values.ingress.enabled .Values.ingress.securityHeaders.enabled }}
{{- $root := . -}}
# Traefik response-header middleware so the gateway-fronted (Helm/Traefik) serving
# path emits the same security headers the legacy Apache vhost set
# (deploy/apache/rmhstudios.conf). Referenced from the Ingress via the
# router.middlewares annotation, keeping header policy as code across both paths.
#
# X-Frame-Options is intentionally omitted; clickjacking is controlled by the
# CSP frame-ancestors directive, which allowlists Discord's Activity origins.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "rmhgo.fullname" $root }}-security-headers
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
spec:
  headers:
    contentTypeNosniff: true
    referrerPolicy: "strict-origin-when-cross-origin"
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    # Single enforced Content-Security-Policy, byte-identical to the Apache vhost
    # (deploy/apache/rmhstudios.conf). Traefik's native contentSecurityPolicy sets
    # the enforcing `Content-Security-Policy` header, so do NOT also set that header
    # under customResponseHeaders — two enforcing CSP headers conflict. (If a
    # report-only tuning policy is ever wanted, add it under the separate
    # `Content-Security-Policy-Report-Only` header, not this one.)
    contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss:; media-src 'self' blob: https:; worker-src 'self' blob:; frame-src 'self' blob: https:; frame-ancestors 'self' https://discord.com https://*.discord.com https://*.discordsays.com; form-action 'self'; object-src 'none'; base-uri 'none'"
    customResponseHeaders:
      X-Permitted-Cross-Domain-Policies: "none"
      # Match the Apache vhost's Permissions-Policy.
      Permissions-Policy: "geolocation=(), microphone=(), camera=(), payment=()"
{{- end }}
