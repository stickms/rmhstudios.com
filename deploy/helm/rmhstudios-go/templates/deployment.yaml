{{- $root := . -}}
{{- range $svc, $cfg := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rmhgo.fullname" $root }}-{{ $svc }}
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $svc }}
    app.kubernetes.io/component: {{ if $cfg.worker }}worker{{ else }}server{{ end }}
spec:
  replicas: {{ $cfg.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/part-of: rmhstudios-go
    spec:
      {{- if $cfg.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ $cfg.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: {{ $svc }}
          image: {{ include "rmhgo.image" (list $root $svc) }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ $root.Values.env.secretName }}
          env:
            {{- if $root.Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ $root.Values.redis.url | quote }}
            {{- end }}
            - name: METRICS_ADDR
              value: ":{{ $root.Values.metricsPort }}"
            {{- if $cfg.port }}
            {{- if eq $svc "gamehub" }}
            - name: SOCKET_PORT
              value: {{ $cfg.port | quote }}
            {{- else if eq $svc "rmhmusic" }}
            - name: RMHMUSIC_PORT
              value: {{ $cfg.port | quote }}
            {{- else if eq $svc "rmhtube" }}
            - name: RMHTUBE_PORT
              value: {{ $cfg.port | quote }}
            {{- else if eq $svc "rmhbox" }}
            - name: RMHBOX_PORT
              value: {{ $cfg.port | quote }}
            {{- else if eq $svc "recap" }}
            - name: RECAP_PORT
              value: {{ $cfg.port | quote }}
            {{- else if eq $svc "assets" }}
            - name: ASSETS_PORT
              value: {{ $cfg.port | quote }}
            {{- else if eq $svc "status" }}
            - name: STATUS_PORT
              value: {{ $cfg.port | quote }}
            {{- $fn := include "rmhgo.fullname" $root }}
            # Background workers (supervisor) and the assets origin have no public
            # route by design, so they are ALWAYS probed on internal Service DNS
            # ({release}-<svc>) — that internal health is the meaningful signal.
            # The supervisor serves /health on its metrics port; cmd/status's bare
            # "supervisor" default doesn't resolve in k8s, hence the override.
            - name: STATUS_SUPERVISOR_URL
              value: "http://{{ $fn }}-supervisor:{{ $root.Values.metricsPort }}/health"
            {{- with $root.Values.services.assets }}
            - name: STATUS_ASSETS_URL
              value: "http://{{ $fn }}-assets:{{ .port }}/health"
            {{- end }}
            {{- if and $root.Values.ingress.enabled $root.Values.ingress.host }}
            # A public ingress host is configured → probe the user-facing services
            # through the PUBLIC path (ingress → gateway → service) so the
            # dashboard mirrors real user reachability, not just pod-to-pod health.
            # STATUS_PUBLIC_ORIGIN drives the website + realtime-hub rows (the
            # gateway passes /<prefix>/health straight through to each hub).
            # Gateway and RMHmusic are k3s-only (cmd/status omits them unless their
            # STATUS_<svc>_URL is set), so wiring them here turns those rows on.
            - name: STATUS_PUBLIC_ORIGIN
              value: "https://{{ $root.Values.ingress.host }}"
            {{- with $root.Values.services.gateway }}
            - name: STATUS_GATEWAY_URL
              value: "https://{{ $root.Values.ingress.host }}/health"
            {{- end }}
            {{- with $root.Values.services.rmhmusic }}
            - name: STATUS_RMHMUSIC_URL
              value: "https://{{ $root.Values.ingress.host }}/rmhmusic-ws/health"
            {{- end }}
            {{- else }}
            # No public ingress (internal/dev cluster) → probe every service on
            # internal Service DNS so the rows still read correctly. "socket" maps
            # to the gamehub Service. Gateway/RMHmusic are enabled here too since
            # there is no public path to reach them through.
            {{- with $root.Values.services.gateway }}
            - name: STATUS_GATEWAY_URL
              value: "http://{{ $fn }}-gateway:{{ .port }}/health"
            {{- end }}
            {{- with $root.Values.services.gamehub }}
            - name: STATUS_SOCKET_URL
              value: "http://{{ $fn }}-gamehub:{{ .port }}/health"
            {{- end }}
            {{- with $root.Values.services.rmhmusic }}
            - name: STATUS_RMHMUSIC_URL
              value: "http://{{ $fn }}-rmhmusic:{{ .port }}/health"
            {{- end }}
            {{- with $root.Values.services.rmhbox }}
            - name: STATUS_RMHBOX_URL
              value: "http://{{ $fn }}-rmhbox:{{ .port }}/health"
            {{- end }}
            {{- with $root.Values.services.rmhtube }}
            - name: STATUS_RMHTUBE_URL
              value: "http://{{ $fn }}-rmhtube:{{ .port }}/health"
            {{- end }}
            {{- end }}
            {{- else if eq $svc "gateway" }}
            - name: PORT_WEB
              value: {{ $cfg.port | quote }}
            # Wire the gateway's reverse-proxy upstreams to the in-cluster
            # Service DNS names (otherwise the compose-style defaults like
            # http://gamehub:7001 don't resolve in Kubernetes).
            {{- $fn := include "rmhgo.fullname" $root }}
            {{- with $root.Values.services.gamehub }}
            - name: GAMEHUB_UPSTREAM
              value: "http://{{ $fn }}-gamehub:{{ .port }}"
            {{- end }}
            {{- with $root.Values.services.rmhbox }}
            - name: RMHBOX_UPSTREAM
              value: "http://{{ $fn }}-rmhbox:{{ .port }}"
            {{- end }}
            {{- with $root.Values.services.rmhtube }}
            - name: RMHTUBE_UPSTREAM
              value: "http://{{ $fn }}-rmhtube:{{ .port }}"
            {{- end }}
            {{- with $root.Values.services.rmhmusic }}
            - name: RMHMUSIC_UPSTREAM
              value: "http://{{ $fn }}-rmhmusic:{{ .port }}"
            {{- end }}
            {{- with $root.Values.services.assets }}
            - name: ASSETS_UPSTREAM
              value: "http://{{ $fn }}-assets:{{ .port }}"
            {{- end }}
            {{- if $root.Values.webUpstream }}
            - name: WEB_UPSTREAM
              value: {{ $root.Values.webUpstream | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with $cfg.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            {{- if $cfg.port }}
            - name: http
              containerPort: {{ $cfg.port }}
            {{- end }}
            {{- if $cfg.worker }}
            - name: metrics
              containerPort: {{ $root.Values.metricsPort }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ include "rmhgo.probePort" (list $cfg $root.Values.metricsPort) }}
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ include "rmhgo.probePort" (list $cfg $root.Values.metricsPort) }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          {{- if and $cfg.storage $root.Values.data.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ $root.Values.data.mountPath }}
          {{- end }}
      {{- if and $cfg.storage $root.Values.data.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $root.Values.data.existingClaim }}
      {{- end }}
{{- end }}
