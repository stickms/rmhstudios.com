{{- if .Values.ingress.enabled }}
{{- $root := . -}}
# All external traffic enters through the gateway, which performs the WS-prefix
# routing to the realtime services and injects the trusted auth headers. Traefik
# therefore only needs one backend (the gateway Service). This keeps the auth
# trust boundary in exactly one place.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rmhgo.fullname" $root }}
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- if .Values.ingress.securityHeaders.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s-security-headers@kubernetescrd" $root.Release.Namespace (include "rmhgo.fullname" $root) | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "rmhgo.fullname" $root }}-gateway
                port:
                  number: {{ .Values.services.gateway.port }}
{{- end }}
