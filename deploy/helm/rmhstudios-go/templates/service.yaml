{{- $root := . -}}
{{- range $svc, $cfg := .Values.services }}
{{- if $cfg.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rmhgo.fullname" $root }}-{{ $svc }}
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $svc }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $svc }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - name: http
      port: {{ $cfg.port }}
      targetPort: {{ $cfg.port }}
{{- else if $cfg.metricsService }}
---
# Internal-only ClusterIP for a worker's shared /health + /metrics endpoint
# (metricsPort). No ingress/path — reached only in-cluster (e.g. the status
# page probing the supervisor's /health).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rmhgo.fullname" $root }}-{{ $svc }}
  labels:
    {{- include "rmhgo.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $svc }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $svc }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - name: metrics
      port: {{ $root.Values.metricsPort }}
      targetPort: {{ $root.Values.metricsPort }}
{{- end }}
{{- end }}
