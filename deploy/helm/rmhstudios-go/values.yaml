# ── rmhstudios-go default values ─────────────────────────────────────────────
# One image PER service (each is a distinct Go binary), named
# <registry>/<repoPrefix>-<service>:<tag>. This is the one deliberate departure
# from PR #121's single-image chart, noted in the chart description: Go services
# are separate static binaries, so they are separate images.

image:
  registry: "" # e.g. registry.example.com (empty => single-node ctr-imported images)
  repoPrefix: rmhstudios-go
  tag: latest
  pullPolicy: IfNotPresent

# Reuse the Secret created out-of-band by PR #121's deploy flow
# (kubectl create secret --from-env-file .env.production). The Go fleet reads the
# SAME env (DATABASE_URL, DISCORD_*, DEEPSEEK_*, BETTER_AUTH_*).
env:
  secretName: rmhstudios-secrets

# Redis backplane (pkg/events) — enables >1 replica for the realtime services.
redis:
  enabled: true
  image: redis:7-alpine
  url: redis://rmhstudios-go-redis:6379

# The React SSR/Nitro web tier (the rmhstudios chart from PR #121). The gateway
# proxies everything that isn't a Go WS prefix here. Override to match that
# chart's Service name in your cluster.
webUpstream: http://rmhstudios-web:7005

# Default probe/metrics port for worker services (no client port).
metricsPort: 9090

# The fleet. `port` = client-facing port (also where /health + /metrics live).
# `worker: true` => no Service, probes hit /health on metricsPort.
# `path` => the Ingress prefix routed to this service (gateway is the catch-all).
services:
  gateway:
    port: 7005
    replicas: 2
    ingress: true
    path: /
  gamehub:
    port: 7001
    replicas: 2
    path: /socket/
  rmhmusic:
    port: 7002
    replicas: 1
    path: /rmhmusic-ws/
  rmhtube:
    port: 7003
    replicas: 1
    path: /rmhtube-ws/
  rmhbox:
    port: 7676
    replicas: 1
    path: /rmhbox-ws/
  recap:
    port: 7004
    replicas: 1
  # supervisor: single pod running the five background workers as goroutines
  # (discord-bot, recap, doctrine-worker, vibe-worker, bot-worker).
  # It exposes only the shared /health + /metrics endpoint on metricsPort (9090).
  # ─── Env union ──────────────────────────────────────────────────────────────
  # All secrets come from secretRef (rmhstudios-secrets); the vars below are
  # inline non-secret values. Secrets the pod needs (all in the Secret):
  #   DATABASE_URL, SERVER_DB_POOL_SIZE, REDIS_URL (injected below)
  #   discord-bot:     DISCORD_BOT_TOKEN, DISCORD_ACTIVITY_BOT_TOKEN,
  #                    DISCORD_DEV_GUILD_ID, OWNER_ID, DEEPSEEK_API_KEY,
  #                    DEEPSEEK_MODEL, RMHBOT_WORKTREES_DIR, GITHUB_TOKEN,
  #                    GITHUB_REPO
  #   recap:           DISCORD_ACTIVITY_BOT_TOKEN, VITE_DISCORD_ACTIVITY_CLIENT_ID,
  #                    DISCORD_ACTIVITY_CLIENT_ID, SITE_URL, VITE_BETTER_AUTH_URL
  #   vibe-worker:     PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
  #   bot-worker:      DEEPSEEK_API_KEY, INTERNAL_API_URL, INTERNAL_API_SECRET,
  #                    BETTER_AUTH_URL, S3_BUCKET, S3_ENDPOINT, S3_ACCESS_KEY_ID,
  #                    S3_SECRET_ACCESS_KEY, S3_REGION, S3_FORCE_PATH_STYLE,
  #                    LOCAL_STORAGE_DIR, XAI_API_KEY, XAI_IMAGE_MODEL,
  #                    XAI_IMAGE_ENABLED, XAI_IMAGE_DAILY_CAP
  #   doctrine-worker: DATABASE_URL only (no extra env beyond Common)
  # ─────────────────────────────────────────────────────────────────────────────
  supervisor:
    worker: true
    replicas: 1
    storage: true          # mounts /app/db PVC for vibe-worker thumbnails
    terminationGracePeriodSeconds: 90  # discord-bot needs 90 s to disconnect
    extraEnv:
      # recap goroutine binds RECAP_PORT inside the supervisor process
      - name: RECAP_PORT
        value: "7004"
  # status: standalone health-dashboard; survives when the rest of the stack is
  # down. Runs on STATUS_PORT (default 7008); /health is served at /.
  status:
    port: 7008
    replicas: 1
    probePath: /health

# Shared storage for vibe-worker thumbnails (same PVC contract as PR #121).
data:
  enabled: true
  existingClaim: rmhstudios-data # reuse the chart-from-#121 PVC if present
  mountPath: /app/db

ingress:
  enabled: false
  className: traefik
  host: REPLACE_ME.example.com
  annotations: {}

resources:
  requests: { cpu: 25m, memory: 32Mi }
  limits: { cpu: "1", memory: 256Mi }
