# Default values — safe for `helm template`/CI. Prod overrides in values-prod.yaml.
nameOverride: ""
fullnameOverride: "rmhstudios"

image:
  # Single-node default: image is imported into k3s containerd locally, so
  # `repository` is the bare name and pullPolicy is Never (no registry).
  #
  # MULTI-NODE: set `repository` to a registry path (e.g. registry.example.com/rmhstudios
  # or ghcr.io/owner/rmhstudios), pullPolicy to IfNotPresent, and add any
  # pullSecrets below. deploy-k8s.sh does this automatically when REGISTRY is set.
  repository: rmhstudios
  tag: latest
  pullPolicy: Never
  # Names of pre-created docker-registry Secrets for pulling from a private registry.
  pullSecrets: []
  #  - regcred

# Secret is created out-of-band from .env.production (see deploy-k8s.sh).
# Templates reference it via envFrom; its contents never enter git or Helm history.
secretName: rmhstudios-secrets

# Shared /app/db volume (Compose: ${STORAGE_PATH:-./db}:/app/db).
data:
  enabled: true
  size: 20Gi
  storageClass: local-path   # k3s built-in provisioner
  mountPath: /app/db
  # MULTI-NODE SEAM: local-path is node-local (RWO). For multi-node set a RWX
  # class (NFS/Longhorn) here AND switch accessModes to [ReadWriteMany] below.
  accessModes:
    - ReadWriteOnce

# MinIO S3-compatible object storage (single-node). The app reaches it via the
# S3_ENDPOINT secret value, e.g. http://rmhstudios-minio:9000.
# MULTI-NODE/PROD: disable and point S3_ENDPOINT at Cloudflare R2 instead.
minio:
  enabled: true
  image: minio/minio:latest
  size: 20Gi
  storageClass: local-path

# discord-bot bind-mounts the repo for git-worktree ops (Compose: RMHBOT_REPO_PATH).
rmhbotRepoPath: /home/rmhstudios/rmhstudios.com

# Common resource floor; override per service as needed.
defaultResources:
  requests:
    cpu: 50m
    memory: 128Mi

services:
  web:
    command: ["node", ".output/server/index.mjs"]
    port: 7005
    portEnv: PORT
    replicas: 1
    probePath: /
    mountData: true
    extraEnv:
      - name: HOSTNAME
        value: "0.0.0.0"
    resources:
      requests: { cpu: 250m, memory: 512Mi }

  socket:
    command: ["node", "dist-server/server/socket-server/index.cjs"]
    port: 7001
    portEnv: SOCKET_PORT
    replicas: 1
    probePath: /

  rmhbox:
    command: ["node", "dist-server/server/rmhbox/index.cjs"]
    port: 7676
    portEnv: RMHBOX_PORT
    replicas: 1
    probePath: /

  rmhtube:
    command: ["node", "dist-server/server/rmhtube/index.cjs"]
    port: 7003
    portEnv: RMHTUBE_PORT
    replicas: 1
    probePath: /

  recap:
    command: ["node", "dist-server/server/recap/index.cjs"]
    port: 7004
    portEnv: RECAP_PORT
    replicas: 1
    probePath: /

  discord-bot:
    command: ["node", "dist-server/server/discord-bot/index.cjs"]
    replicas: 1
    mountData: true
    mountRepo: true
    stopGracePeriod: 90

  doctrine-worker:
    command: ["node", "dist-server/server/doctrine-worker/index.cjs"]
    replicas: 1

  vibe-worker:
    command: ["node", "dist-server/server/vibe-worker/index.cjs"]
    replicas: 1
    mountData: true
    stopGracePeriod: 30
    resources:
      requests: { cpu: 250m, memory: 768Mi }   # Chromium captures

  bot-worker:
    command: ["node", "dist-server/server/bot-worker/index.cjs"]
    replicas: 1

  ladder-worker:
    command: ["node", "dist-server/server/ladder-worker/index.cjs"]
    replicas: 1

# Migration hook (pre-install/pre-upgrade). Mirrors deploy.sh step 3.
migrations:
  enabled: true
  baseline: "0_baseline"

ingress:
  enabled: false
  className: traefik
  annotations: {}
  tls:
    enabled: false
    secretName: rmhstudios-tls
  hosts: []
