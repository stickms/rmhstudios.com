# ─────────────────────────────────────────────────────────────────────────────
# Continuous deployment — build the two Docker images in CI and hand off to the
# VPS for the release.
#
# Flow (every push to main):
#   1. `ci` (typecheck/lint/test) and `build` (images) run IN PARALLEL. The CI
#      gate no longer serializes in front of the ~8 min build — it runs in the
#      build's shadow, so a green deploy costs ~max(ci, build), not ci + build.
#   2. `build` builds BOTH images from ONE shared BuildKit graph via
#      `docker buildx bake` (see docker-bake.hcl): the slim web image (`runner`)
#      and the full supervisor/status image (`runner-full`, FROM the in-graph
#      `runner`). The expensive Vite build is a shared stage → runs ONCE; the Go
#      build + Chromium layer that `runner-full` adds run in parallel with it,
#      not serialized behind a second `docker build`. Both are pushed to GHCR
#      tagged with the commit SHA (+ :latest).
#   3. `deploy-gate` (needs BOTH ci + build) POSTs the HMAC-signed request to the
#      VPS webhook listener (webhook-server.cjs) with the built SHA — but ONLY
#      when CI is green. The listener runs `deploy.sh production <sha>`, which
#      PULLS these images, migrates, and blue/green-swaps — see deploy.sh.
#
# Gating the *webhook trigger* (not the image build) preserves the exact safety
# of the old serial gate — red CI ⇒ no webhook ⇒ nothing ships — while letting
# the build run concurrently. A build that ran while CI turned out red just
# leaves an inert SHA-tagged image in GHCR that no deploy ever pulls.
#
# The heavy build (vibe-packages → vite build → esbuild → Go → Chromium) runs
# here instead of on the VPS; deploy.sh no longer builds anything.
#
# One-time setup (see deploy/README.md "Automated deploys — CI build → GHCR"):
#   • Repo VARIABLES (Settings → Secrets and variables → Actions → Variables) —
#     these are baked into the client bundle by `vite build`, so they must be the
#     PRODUCTION values (they are public, not secrets):
#       PROD_BETTER_AUTH_URL, PROD_VITE_BETTER_AUTH_URL, PROD_VITE_SOCKET_URL,
#       PROD_VITE_RMHBOX_SOCKET_URL, PROD_VITE_RMHTUBE_SOCKET_URL,
#       PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID, PROD_VITE_CDN_BASE_URL
#   • Repo SECRETS:
#       DEPLOY_WEBHOOK_URL  — public URL that proxies to the listener (127.0.0.1:7002)
#       WEBHOOK_SECRET      — same value as the listener's WEBHOOK_SECRET env
#       DEEPSEEK_API_KEY    — optional (library cover titles); may be unset
#       DISCORD_WEBHOOK_URL — optional; enables the push → build → deploy embed
#                             that Actions posts and deploy.sh edits (same URL the
#                             VPS listener's DISCORD_WEBHOOK_URL env uses). Unset =
#                             no CI-side Discord messages (deploy.sh still posts).
#   • On the VPS: give deploy.sh a token that can pull the GHCR packages
#     (GHCR_TOKEN / GITHUB_TOKEN with read:packages) OR make the two packages
#     public. Remove GitHub's old push webhook so only THIS workflow drives the
#     listener (a raw push webhook would fire before the image exists).
#   • GHCR layer cache: the build refreshes ${IMAGE_WEB}:buildcache (the full
#     shared Node/Vite graph) and can read the older ${IMAGE_FULL}:buildcache as
#     a best-effort warm start. Cache misses only cause cold stages; they never
#     block image production or deploy. See docker-bake.hcl.
# ─────────────────────────────────────────────────────────────────────────────
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One build per ref at a time. A newer commit to the same ref CANCELS the
# in-progress run and starts fresh — no point finishing a build that's already
# superseded. Keyed by ref so a branch test-dispatch never cancels a production
# (main) build, and vice-versa.
#
# NOTE: this cancels the BUILD only. The VPS deploy phase has its own flock+queue
# in deploy.sh — a running deploy is never interrupted mid-migration/hotswap; a
# newer deploy queues and supersedes older queued ones once the current finishes.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs packages:write to push the images to GHCR; nothing else.
permissions:
  contents: read
  packages: write

env:
  IMAGE_WEB: ghcr.io/stickms/rmhstudios-app
  IMAGE_FULL: ghcr.io/stickms/rmhstudios-app-full

jobs:
  # ── CI gate (audit §5.4) ────────────────────────────────────────────────────
  # Runs the same fast, high-signal web checks as web-ci.yml. `deploy-gate`
  # `needs:` this AND `build` — so a red CI can no longer ship, but CI is no
  # longer in the deploy's critical path (it runs concurrently with the build).
  #
  # Why an in-workflow gate rather than a `workflow_run:` trigger keyed on
  # web-ci: web-ci.yml has `paths-ignore` (go-services/**, deploy/**, docs/**,
  # **/*.md), so a go-only, deploy-config-only, or docs-only push to main does
  # NOT run web-ci. A `workflow_run` gate on it would then never fire for those
  # pushes, and legitimate changes could never deploy — and deploy.sh itself
  # lives under deploy/**. A same-workflow gate runs on EVERY push to main
  # regardless of paths. Note: build-TIME breakage (web or Go) is ALREADY
  # blocking, because the image build in `build` fails before anything usable is
  # deployed; this job adds the typecheck/lint/test coverage the build doesn't.
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    # tsc/vitest on this codebase exceed Node's default ~4 GB heap (matches
    # web-ci.yml); set the larger heap for every step.
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      # Node 24.18.0 to match the production Dockerfile.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: pnpm

      # postinstall runs `prisma generate` (schema-only, no DB needed).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist tsc's incremental program graph + eslint's result cache across
      # runs so warm runs only re-check changed files. Mirrors web-ci.yml's PR
      # gate. This matters MORE here: with the vite build cut to ~40s (i18n/vibe/
      # brotli work), this `ci` job — serial tsc (~84s) + lint (~71s) — is about to
      # become the deploy's critical path instead of the build. Both tools
      # invalidate by file content, so a restored cache can only be faster.
      - name: Restore typecheck/lint caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .cache/tsc
            .cache/eslint
          key: tsc-eslint-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            tsc-eslint-${{ runner.os }}-

      - name: Typecheck
        run: |
          mkdir -p .cache/tsc
          pnpm exec tsc --noEmit --incremental --tsBuildInfoFile .cache/tsc/app.tsbuildinfo

      - name: Lint
        run: |
          mkdir -p .cache/eslint
          pnpm exec eslint --cache --cache-location .cache/eslint/eslintcache --cache-strategy content

      # Advisory (warn, don't block) by owner decision: a failing test no longer
      # gates the deploy — typecheck + lint above stay hard gates, and the image
      # build in `build` still blocks on any build-time breakage. A red test
      # turns this step's annotation red and shows in the run summary, but `ci`
      # still succeeds so `deploy-gate` proceeds. To heal i18n-catalogs drift
      # specifically, run `pnpm i18n:translate && pnpm i18n:resources` or extend
      # the allowlist in lib/__tests__/i18n-catalogs.test.ts.
      - name: Test
        run: pnpm exec vitest run
        continue-on-error: true

  build:
    # NO `needs:` — runs concurrently with `ci`. `deploy-gate` waits on both.
    # Native ARM64 hosted runner (free on public repos) — builds arm64 images for
    # the Oracle ARM VPS without slow QEMU emulation.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    outputs:
      commit_short: ${{ steps.commit.outputs.short }}
      commit_msg: ${{ steps.commit.outputs.msg }}
      commit_author: ${{ steps.commit.outputs.author }}
      discord_msg_id: ${{ steps.discord_out.outputs.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve commit info (for Discord pipeline embed)
        id: commit
        if: github.ref == 'refs/heads/main'
        run: |
          set -uo pipefail
          # %s is the single-line subject (no newlines → safe for outputs).
          {
            echo "short=$(git rev-parse --short HEAD)"
            echo "msg=$(git log -1 --pretty=%s)"
            echo "author=$(git log -1 --pretty=%an)"
          } >> "$GITHUB_OUTPUT"
          {
            echo "COMMIT_SHORT=$(git rev-parse --short HEAD)"
            echo "COMMIT_MSG=$(git log -1 --pretty=%s)"
            echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)"
          } >> "$GITHUB_ENV"

      - name: Verify required deploy variables + secrets
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PROD_BETTER_AUTH_URL: ${{ vars.PROD_BETTER_AUTH_URL }}
          PROD_VITE_BETTER_AUTH_URL: ${{ vars.PROD_VITE_BETTER_AUTH_URL }}
          PROD_VITE_SOCKET_URL: ${{ vars.PROD_VITE_SOCKET_URL }}
          PROD_VITE_RMHBOX_SOCKET_URL: ${{ vars.PROD_VITE_RMHBOX_SOCKET_URL }}
          PROD_VITE_RMHTUBE_SOCKET_URL: ${{ vars.PROD_VITE_RMHTUBE_SOCKET_URL }}
          PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID: ${{ vars.PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID }}
          PROD_VITE_CDN_BASE_URL: ${{ vars.PROD_VITE_CDN_BASE_URL }}
        run: |
          set -uo pipefail
          missing=""
          for name in DEPLOY_WEBHOOK_URL WEBHOOK_SECRET \
                      PROD_BETTER_AUTH_URL PROD_VITE_BETTER_AUTH_URL \
                      PROD_VITE_SOCKET_URL PROD_VITE_RMHBOX_SOCKET_URL \
                      PROD_VITE_RMHTUBE_SOCKET_URL PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID \
                      PROD_VITE_CDN_BASE_URL; do
            if [ -z "${!name:-}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required deploy config:$missing — see deploy/README.md 'Automated deploys — CI build → GHCR'." >&2
            exit 1
          fi

      - name: Discord — build started
        if: github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bash .github/scripts/discord-notify.sh post 16776960 \
            "🟡 [PRODUCTION] Commit ${COMMIT_SHORT:-} — build started" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"
          # Stamp the build start so the "images pushed" edit can show how long the
          # build took. Runs even when Discord is off (the step is only ref-gated).
          echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      # Export the Discord message id (set into $GITHUB_ENV by discord-notify.sh
      # `post`) as a JOB OUTPUT so deploy-gate can EDIT the same embed after the
      # gate resolves. Empty on non-main / when Discord is off — the edit no-ops.
      - name: Export Discord message id
        id: discord_out
        if: always()
        run: echo "id=${DISCORD_MSG_ID:-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── Persist the vite-builder cache mounts across CI runs (audit §2) ───────
      # BuildKit `--mount=type=cache` dirs are builder-local scratch: the GHCR
      # registry LAYER cache does not carry them, and setup-buildx spins up a FRESH,
      # empty builder every run — so the always-re-run vite-builder stage starts its
      # `.vinxi` module-graph cache and its build-vibe-packages output cache COLD
      # each build. These two steps extract those mounts to the workspace after the
      # build and restore them before the next one, so the incremental caches
      # survive between runs.
      #
      # SAFETY (this is on the production deploy path): the inject step is
      # `continue-on-error`, and the dance action's extraction runs as a
      # `post-if: success()` hook — it NEVER runs on a failed build and cannot turn
      # a green build red. Worst case it no-ops and we are back to today's cold
      # mounts; it can never block a deploy.
      #
      # CORRECTNESS: BuildKit keys cache mounts by `id`, not target path, so the id
      # below MUST equal the Dockerfile's `id=vinxi-cache-${COMPOSE_PROJECT_NAME}`
      # with COMPOSE_PROJECT_NAME=rmhstudios-prod (the bake env below). A mismatch
      # makes this silently cache nothing (still safe). (The vibe-packages bundle
      # cache moved out of a cache-mount into the dedicated, layer-cached
      # vibe-builder Docker stage, so only the vite .vinxi module graph is danced here.)
      #
      # TO REVERT (if a measured before/after doesn't beat the dance's own extract
      # overhead): delete these two steps — nothing else depends on them — and drop
      # the `.buildkit-cache` / `.buildkit-scratch` entries from .dockerignore.
      - name: Restore vite build-cache mounts
        id: vite-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .buildkit-cache
          key: buildkit-vite-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            buildkit-vite-${{ runner.os }}-
      - name: Inject vite build-cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        continue-on-error: true
        with:
          scratch-dir: .buildkit-scratch
          skip-extraction: ${{ steps.vite-cache.outputs.cache-hit }}
          cache-map: |
            {
              ".buildkit-cache/vinxi": { "target": "/app/.vinxi", "id": "vinxi-cache-rmhstudios-prod" }
            }

      # Build + push BOTH images in a single BuildKit graph (docker-bake.hcl).
      # Vite (the ~5 min long pole) is a shared stage built once; the Go build +
      # Chromium layer for runner-full run in parallel with it. Registry-backed
      # layer cache on GHCR (no 10 GB GHA-cache eviction cap).
      - name: Build + push both images (bake, single graph)
        env:
          GIT_SHA: ${{ github.sha }}
          COMPOSE_PROJECT_NAME: rmhstudios-prod
          DATABASE_URL: postgresql://ci-build:ci-build@localhost:5432/ci-build
          BETTER_AUTH_SECRET: ci-build-not-a-runtime-secret-000000000000
          BETTER_AUTH_URL: ${{ vars.PROD_BETTER_AUTH_URL }}
          VITE_BETTER_AUTH_URL: ${{ vars.PROD_VITE_BETTER_AUTH_URL }}
          VITE_SOCKET_URL: ${{ vars.PROD_VITE_SOCKET_URL }}
          VITE_RMHBOX_SOCKET_URL: ${{ vars.PROD_VITE_RMHBOX_SOCKET_URL }}
          VITE_RMHTUBE_SOCKET_URL: ${{ vars.PROD_VITE_RMHTUBE_SOCKET_URL }}
          VITE_DISCORD_ACTIVITY_CLIENT_ID: ${{ vars.PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID }}
          VITE_CDN_BASE_URL: ${{ vars.PROD_VITE_CDN_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          docker buildx bake -f docker-bake.hcl --push web full

      - name: Discord — images pushed, awaiting CI gate
        if: github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Build duration = now − the stamp from the "build started" step.
          now=$(date +%s)
          start="${BUILD_START_EPOCH:-$now}"
          elapsed=$(( now - start ))
          dur="$(( elapsed / 60 ))m $(( elapsed % 60 ))s"
          bash .github/scripts/discord-notify.sh edit 3447003 \
            "🔵 [PRODUCTION] Commit ${COMMIT_SHORT:-} — images built + pushed to GHCR in ${dur}, awaiting CI gate…" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"

      - name: Discord — build superseded (cancelled)
        if: cancelled() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # A newer commit cancelled this build (cancel-in-progress). Close out its
          # embed so it doesn't sit orphaned at 🟡; the newer commit posts its own.
          bash .github/scripts/discord-notify.sh edit 9807270 \
            "⏹️ [PRODUCTION] Commit ${COMMIT_SHORT:-} — build superseded by a newer commit" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"

  # ── Deploy gate: fire the VPS webhook ONLY when CI + build are both green ────
  # `if: always()` so this runs even when `ci` fails (so it can mark the embed
  # red). The trigger step is guarded on BOTH jobs succeeding; the failure step
  # fires when either genuinely failed. Cancellation (superseded) is handled by
  # `build` above, so neither step runs then.
  deploy-gate:
    needs: [ci, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # deploy-gate runs .github/scripts/discord-notify.sh, so it needs the repo on
      # disk. WITHOUT this checkout the gate-failed / trigger-failed alerts silently
      # no-op with "discord-notify.sh: No such file or directory" (the `|| true`
      # masks it) — so a BLOCKED deploy never turns the pipeline embed 🔴 and no
      # Discord alert is sent, which is exactly the failure this job exists to report.
      #
      # Sparse-checkout ONLY .github/scripts (all this job touches — discord-notify.sh
      # is self-contained) instead of the full tree. This job sits on the deploy's
      # critical path (it fires the VPS webhook), so trimming its checkout from the
      # whole repo to one dir shaves several seconds off time-to-webhook.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: .github/scripts

      - name: Gate failed — CI, build, or a stall blocked the deploy
        # `!= 'success'` (not `== 'failure'`) so a CANCELLED or TIMED-OUT job — i.e. a
        # stalled run that hit its timeout-minutes — also alerts, not just a clean
        # lint/test failure. This exactly complements the trigger step's
        # `success && success` guard, so precisely one of the two steps runs.
        if: needs.ci.result != 'success' || needs.build.result != 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MSG_ID: ${{ needs.build.outputs.discord_msg_id }}
          COMMIT_SHORT: ${{ needs.build.outputs.commit_short }}
          COMMIT_MSG: ${{ needs.build.outputs.commit_msg }}
          COMMIT_AUTHOR: ${{ needs.build.outputs.commit_author }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # edit-or-post: if `build` died before posting the 🟡 embed there is no
            # id to edit, so post a fresh red alert instead of silently no-opping.
            # Fall back to the raw SHA for the label if the build never exported one.
            bash .github/scripts/discord-notify.sh edit-or-post 15158332 \
              "🔴 [PRODUCTION] Commit ${COMMIT_SHORT:-${GIT_SHA:0:7}} — deploy BLOCKED (CI=${{ needs.ci.result }}, build=${{ needs.build.result }}); nothing shipped" \
              "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}" || true
          fi
          echo "::error::Deploy gate failed — CI=${{ needs.ci.result }}, build=${{ needs.build.result }}. Images (if any) are inert; nothing shipped."
          exit 1

      - name: Trigger VPS deploy (webhook listener)
        if: needs.ci.result == 'success' && needs.build.result == 'success'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          COMMIT_REF: ${{ github.ref }}
          COMMIT_SHA: ${{ github.sha }}
          DISCORD_MSG_ID: ${{ needs.build.outputs.discord_msg_id }}
        run: |
          set -euo pipefail
          # Body carries ONLY {ref, after} — the fields the listener maps + the SHA
          # deploy.sh pulls. The Discord message id rides in the X-Discord-Msg-Id
          # HEADER (keeping the body minimal). The body HMAC authenticates the
          # request, computed exactly like webhook-server.cjs (crypto.createHmac
          # 'sha256' over the raw body, hex), the secret read from the environment.
          body="$(jq -nc \
            --arg ref "$COMMIT_REF" \
            --arg after "$COMMIT_SHA" \
            '{ref:$ref, after:$after}')"
          sig="sha256=$(printf '%s' "$body" | node -e 'const c=require("crypto");let d="";process.stdin.on("data",x=>d+=x).on("end",()=>process.stdout.write(c.createHmac("sha256",process.env.WEBHOOK_SECRET).update(d).digest("hex")))')"
          echo "Triggering deploy for ${COMMIT_SHA}"
          # Capture the status + response body so a failure shows WHO rejected it and
          # why (e.g. the listener's 'Unauthorized', or a proxy/Discord error page),
          # instead of curl -f hiding it.
          code=$(curl -sS -o /tmp/webhook-resp.txt -w '%{http_code}' --max-time 30 -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $sig" \
            -H "X-Discord-Msg-Id: ${DISCORD_MSG_ID:-}" \
            --data-raw "$body" || echo "000")
          case "$code" in
            2*) echo "Trigger accepted (HTTP $code)." ;;
            *)
              echo "::error::Webhook trigger returned HTTP $code:"
              cat /tmp/webhook-resp.txt 2>/dev/null || true
              echo
              exit 1
              ;;
          esac

      - name: Discord — trigger failed (post-build handoff)
        if: failure() && needs.ci.result == 'success' && needs.build.result == 'success' && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MSG_ID: ${{ needs.build.outputs.discord_msg_id }}
          COMMIT_SHORT: ${{ needs.build.outputs.commit_short }}
          COMMIT_MSG: ${{ needs.build.outputs.commit_msg }}
          COMMIT_AUTHOR: ${{ needs.build.outputs.commit_author }}
        run: |
          # Only fires when the webhook handoff itself failed (build + CI were
          # green). Once deploy.sh is triggered it owns the message's final state.
          bash .github/scripts/discord-notify.sh edit 15158332 \
            "🔴 [PRODUCTION] Commit ${COMMIT_SHORT:-} — CI green + images pushed, but the VPS deploy trigger failed (see Actions logs)" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"
