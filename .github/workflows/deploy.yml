# ─────────────────────────────────────────────────────────────────────────────
# Continuous deployment — build the two Docker images in CI and hand off to the
# VPS for the release.
#
# Flow (every push to main):
#   1. Build the slim web image (target `runner`) natively on an ARM64 runner
#      (matches the Oracle ARM VPS) and push it to GHCR tagged with the commit SHA.
#   2. Build the full supervisor/status image (target `runner-full`) FROM that
#      just-pushed web image (so the Vite build runs exactly ONCE) and push it too.
#   3. POST an HMAC-signed request to the VPS webhook listener (webhook-server.cjs)
#      with the built SHA. The listener runs `deploy.sh production <sha>`, which
#      PULLS these images, migrates, and blue/green-swaps — see deploy.sh.
#
# The heavy build (vibe-packages → vite build → esbuild → Go → Chromium) now runs
# here instead of on the VPS; deploy.sh no longer builds anything.
#
# One-time setup (see deploy/README.md "Automated deploys — CI build → GHCR"):
#   • Repo VARIABLES (Settings → Secrets and variables → Actions → Variables) —
#     these are baked into the client bundle by `vite build`, so they must be the
#     PRODUCTION values (they are public, not secrets):
#       PROD_BETTER_AUTH_URL, PROD_VITE_BETTER_AUTH_URL, PROD_VITE_SOCKET_URL,
#       PROD_VITE_RMHBOX_SOCKET_URL, PROD_VITE_RMHTUBE_SOCKET_URL,
#       PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID, PROD_VITE_CDN_BASE_URL
#   • Repo SECRETS:
#       DEPLOY_WEBHOOK_URL  — public URL that proxies to the listener (127.0.0.1:7002)
#       WEBHOOK_SECRET      — same value as the listener's WEBHOOK_SECRET env
#       DEEPSEEK_API_KEY    — optional (library cover titles); may be unset
#       DISCORD_WEBHOOK_URL — optional; enables the push → build → deploy embed
#                             that Actions posts and deploy.sh edits (same URL the
#                             VPS listener's DISCORD_WEBHOOK_URL env uses). Unset =
#                             no CI-side Discord messages (deploy.sh still posts).
#   • On the VPS: give deploy.sh a token that can pull the GHCR packages
#     (GHCR_TOKEN / GITHUB_TOKEN with read:packages) OR make the two packages
#     public. Remove GitHub's old push webhook so only THIS workflow drives the
#     listener (a raw push webhook would fire before the image exists).
# ─────────────────────────────────────────────────────────────────────────────
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One build per ref at a time. A newer commit to the same ref CANCELS the
# in-progress build and starts fresh — no point finishing a build that's already
# superseded. Keyed by ref so a branch test-dispatch never cancels a production
# (main) build, and vice-versa.
#
# NOTE: this cancels the BUILD only. The VPS deploy phase has its own flock+queue
# in deploy.sh — a running deploy is never interrupted mid-migration/hotswap; a
# newer deploy queues and supersedes older queued ones once the current finishes.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs packages:write to push the images to GHCR; nothing else.
permissions:
  contents: read
  packages: write

env:
  IMAGE_WEB: ghcr.io/stickms/rmhstudios-app
  IMAGE_FULL: ghcr.io/stickms/rmhstudios-app-full

jobs:
  build-and-deploy:
    # Native ARM64 hosted runner (free on public repos) — builds arm64 images for
    # the Oracle ARM VPS without slow QEMU emulation.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve commit info (for Discord pipeline embed)
        if: github.ref == 'refs/heads/main'
        run: |
          set -uo pipefail
          # %s is the single-line subject (no newlines → safe for $GITHUB_ENV).
          {
            echo "COMMIT_SHORT=$(git rev-parse --short HEAD)"
            echo "COMMIT_MSG=$(git log -1 --pretty=%s)"
            echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)"
          } >> "$GITHUB_ENV"

      - name: Verify required deploy variables + secrets
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PROD_BETTER_AUTH_URL: ${{ vars.PROD_BETTER_AUTH_URL }}
          PROD_VITE_BETTER_AUTH_URL: ${{ vars.PROD_VITE_BETTER_AUTH_URL }}
          PROD_VITE_SOCKET_URL: ${{ vars.PROD_VITE_SOCKET_URL }}
          PROD_VITE_RMHBOX_SOCKET_URL: ${{ vars.PROD_VITE_RMHBOX_SOCKET_URL }}
          PROD_VITE_RMHTUBE_SOCKET_URL: ${{ vars.PROD_VITE_RMHTUBE_SOCKET_URL }}
          PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID: ${{ vars.PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID }}
          PROD_VITE_CDN_BASE_URL: ${{ vars.PROD_VITE_CDN_BASE_URL }}
        run: |
          set -uo pipefail
          missing=""
          for name in DEPLOY_WEBHOOK_URL WEBHOOK_SECRET \
                      PROD_BETTER_AUTH_URL PROD_VITE_BETTER_AUTH_URL \
                      PROD_VITE_SOCKET_URL PROD_VITE_RMHBOX_SOCKET_URL \
                      PROD_VITE_RMHTUBE_SOCKET_URL PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID \
                      PROD_VITE_CDN_BASE_URL; do
            if [ -z "${!name:-}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required deploy config:$missing — see deploy/README.md 'Automated deploys — CI build → GHCR'." >&2
            exit 1
          fi

      - name: Discord — build started
        if: github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bash .github/scripts/discord-notify.sh post 16776960 \
            "🟡 [PRODUCTION] Commit ${COMMIT_SHORT:-} — build started" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"
          # Stamp the build start so the "images pushed" edit can show how long the
          # build took. Runs even when Discord is off (the step is only ref-gated).
          echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push slim web image (runner)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: runner
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            COMPOSE_PROJECT_NAME=rmhstudios-prod
            DATABASE_URL=postgresql://ci-build:ci-build@localhost:5432/ci-build
            BETTER_AUTH_SECRET=ci-build-not-a-runtime-secret-000000000000
            BETTER_AUTH_URL=${{ vars.PROD_BETTER_AUTH_URL }}
            VITE_BETTER_AUTH_URL=${{ vars.PROD_VITE_BETTER_AUTH_URL }}
            VITE_SOCKET_URL=${{ vars.PROD_VITE_SOCKET_URL }}
            VITE_RMHBOX_SOCKET_URL=${{ vars.PROD_VITE_RMHBOX_SOCKET_URL }}
            VITE_RMHTUBE_SOCKET_URL=${{ vars.PROD_VITE_RMHTUBE_SOCKET_URL }}
            VITE_DISCORD_ACTIVITY_CLIENT_ID=${{ vars.PROD_VITE_DISCORD_ACTIVITY_CLIENT_ID }}
            VITE_CDN_BASE_URL=${{ vars.PROD_VITE_CDN_BASE_URL }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build + push full image (runner-full, FROM the pushed web image)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: runner-full
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_FULL }}:${{ github.sha }}
            ${{ env.IMAGE_FULL }}:latest
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full
          build-args: |
            WEB_IMAGE=${{ env.IMAGE_WEB }}:${{ github.sha }}

      - name: Discord — images pushed, triggering deploy
        if: github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Build duration = now − the stamp from the "build started" step.
          now=$(date +%s)
          start="${BUILD_START_EPOCH:-$now}"
          elapsed=$(( now - start ))
          dur="$(( elapsed / 60 ))m $(( elapsed % 60 ))s"
          bash .github/scripts/discord-notify.sh edit 3447003 \
            "🔵 [PRODUCTION] Commit ${COMMIT_SHORT:-} — images built + pushed to GHCR in ${dur}, triggering deploy…" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"

      - name: Trigger VPS deploy (webhook listener)
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          COMMIT_REF: ${{ github.ref }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Body carries ONLY {ref, after} — the fields the listener maps + the SHA
          # deploy.sh pulls. The Discord message id rides in the X-Discord-Msg-Id
          # HEADER (keeping the body minimal). The body HMAC authenticates the
          # request, computed exactly like webhook-server.cjs (crypto.createHmac
          # 'sha256' over the raw body, hex), the secret read from the environment.
          body="$(jq -nc \
            --arg ref "$COMMIT_REF" \
            --arg after "$COMMIT_SHA" \
            '{ref:$ref, after:$after}')"
          sig="sha256=$(printf '%s' "$body" | node -e 'const c=require("crypto");let d="";process.stdin.on("data",x=>d+=x).on("end",()=>process.stdout.write(c.createHmac("sha256",process.env.WEBHOOK_SECRET).update(d).digest("hex")))')"
          echo "Triggering deploy for ${COMMIT_SHA}"
          # Capture the status + response body so a failure shows WHO rejected it and
          # why (e.g. the listener's 'Unauthorized', or a proxy/Discord error page),
          # instead of curl -f hiding it.
          code=$(curl -sS -o /tmp/webhook-resp.txt -w '%{http_code}' --max-time 30 -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $sig" \
            -H "X-Discord-Msg-Id: ${DISCORD_MSG_ID:-}" \
            --data-raw "$body" || echo "000")
          case "$code" in
            2*) echo "Trigger accepted (HTTP $code)." ;;
            *)
              echo "::error::Webhook trigger returned HTTP $code:"
              cat /tmp/webhook-resp.txt 2>/dev/null || true
              echo
              exit 1
              ;;
          esac

      - name: Discord — pipeline failed (build or trigger)
        if: failure() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Only fires when a step BEFORE the VPS handoff failed (build/trigger).
          # Once deploy.sh is triggered it owns the message's final state.
          bash .github/scripts/discord-notify.sh edit 15158332 \
            "🔴 [PRODUCTION] Commit ${COMMIT_SHORT:-} — CI build/trigger failed (see Actions logs)" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"

      - name: Discord — build superseded (cancelled)
        if: cancelled() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # A newer commit cancelled this build (cancel-in-progress). Close out its
          # embed so it doesn't sit orphaned at 🟡; the newer commit posts its own.
          bash .github/scripts/discord-notify.sh edit 9807270 \
            "⏹️ [PRODUCTION] Commit ${COMMIT_SHORT:-} — build superseded by a newer commit" \
            "${COMMIT_MSG:-}" "${COMMIT_AUTHOR:-}"
