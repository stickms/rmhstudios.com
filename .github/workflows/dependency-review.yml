# ─────────────────────────────────────────────────────────────────────────────
# Dependency review — inspects the dependency changes a PR introduces and fails if
# any new dependency carries a known high/critical vulnerability. Posts a summary
# on the PR when it fails. Requires the repo's Dependency Graph to be enabled
# (Settings → Code security); on private repos this needs GitHub Advanced Security.
# ─────────────────────────────────────────────────────────────────────────────
name: dependency-review

on:
  pull_request:
    # Only dependency-manifest changes can introduce a new dependency vuln, so
    # scope the check to them instead of running on every PR (incl. docs-only).
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "go-services/go.mod"
      - "go-services/go.sum"
      - "cli/package.json"

concurrency:
  group: dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
