# ─────────────────────────────────────────────────────────────────────────────
# TruffleHog — scans for secrets and, crucially, VERIFIES them against the live
# provider so only genuinely active credentials fail the build (`--only-verified`
# = near-zero false positives). Complements gitleaks (pattern-based).
# ─────────────────────────────────────────────────────────────────────────────
name: trufflehog

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: trufflehog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --only-verified
