name: go-microservices

on:
  push:
    paths:
      - "go-services/**"
      - "deploy/helm/rmhstudios-go/**"
      - ".github/workflows/go-microservices.yml"
  pull_request:
    paths:
      - "go-services/**"
      - "deploy/helm/rmhstudios-go/**"

# Cancel superseded runs: a new push to the same branch/PR aborts the in-flight
# bazel build+test, the Postgres-backed e2e job, and the helm lint instead of
# letting them run to completion against stale code. Frees runners and gives
# faster feedback on the latest commit.
concurrency:
  group: go-microservices-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # Opt-in remote action cache shared across runners (and dev machines). Set
      # the BAZEL_REMOTE_CACHE repo secret to a gRPC/HTTP cache URL (BuildBuddy,
      # NativeLink, a GCS bucket, …) to enable it; inert (local disk cache only)
      # when the secret is unset, so this never breaks a fork/PR without secrets.
      BAZEL_REMOTE_CACHE: ${{ secrets.BAZEL_REMOTE_CACHE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-${{ runner.os }}-${{ hashFiles('go-services/go.sum', 'MODULE.bazel') }}
          restore-keys: bazel-disk-${{ runner.os }}-
      - name: bootstrap toolchain (guard mode — installs bazelisk, no privileged installs)
        run: ./scripts/preflight.sh --guard
      - name: configure remote cache (opt-in)
        if: env.BAZEL_REMOTE_CACHE != ''
        run: echo "build --remote_cache=${BAZEL_REMOTE_CACHE}" >> .bazelrc
      - name: build + test (bazel)
        run: bazelisk test --build_tests_only //go-services/...

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-services
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rmh
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.23", cache-dependency-path: go-services/go.sum }
      - name: load e2e schema
        env: { PGPASSWORD: postgres }
        run: psql -h localhost -U postgres -d rmh -f scripts/e2e/schema.sql
      - name: run e2e (binaries + ws clients)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/rmh?sslmode=disable
        run: bash scripts/e2e/run.sh --no-docker

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
      - run: helm lint deploy/helm/rmhstudios-go
        working-directory: .
      - run: helm template rmhstudios-go deploy/helm/rmhstudios-go > /dev/null
        working-directory: .
