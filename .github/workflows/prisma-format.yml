# ─────────────────────────────────────────────────────────────────────────────
# Reports whether `prisma format` would rewrite schema.prisma (canonical field
# alignment, relation formatting). Report-only; the working tree is restored.
# ─────────────────────────────────────────────────────────────────────────────
name: prisma-format

on:
  pull_request:
    paths:
      - "prisma/schema.prisma"
      - ".github/workflows/prisma-format.yml"
  workflow_dispatch: {}

concurrency:
  group: prisma-format-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rmh
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prisma format check
        run: |
          set -uo pipefail
          pnpm exec prisma format || true
          if git diff --quiet -- prisma/schema.prisma; then
            echo "schema.prisma is already prisma-formatted."
          else
            {
              echo '### prisma format would change schema.prisma'
              echo ''
              echo '```diff'
              git --no-pager diff -- prisma/schema.prisma | head -200
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            git checkout -- prisma/schema.prisma
          fi
