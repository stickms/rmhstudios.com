# ─────────────────────────────────────────────────────────────────────────────
# Sanity-checks public/robots.txt: must declare at least one User-agent, and
# should point at a Sitemap. Static check.
# ─────────────────────────────────────────────────────────────────────────────
name: robots-check

on:
  pull_request:
    paths:
      - "public/robots.txt"
      - ".github/workflows/robots-check.yml"
  push:
    branches: [main]
    paths:
      - "public/robots.txt"
  workflow_dispatch: {}

concurrency:
  group: robots-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate robots.txt
        run: |
          set -uo pipefail
          f='public/robots.txt'
          if ! grep -qiE '^[[:space:]]*User-agent:' "${f}"; then
            echo "::error::robots.txt has no User-agent line"; exit 1
          fi
          if ! grep -qiE '^[[:space:]]*Sitemap:' "${f}"; then
            echo "::warning::robots.txt has no Sitemap: line"
          fi
          echo "robots.txt looks valid."
