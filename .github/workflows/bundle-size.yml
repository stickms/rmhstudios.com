# ─────────────────────────────────────────────────────────────────────────────
# Builds the frontend and reports the client bundle size (total + the largest
# chunks) to the run summary — a regression signal for shipped JS/CSS weight.
# Report-only. Build-only (no DB / server boot); scheduled + on demand.
# ─────────────────────────────────────────────────────────────────────────────
name: bundle-size

on:
  schedule:
    - cron: "0 4 * * 2"
  workflow_dispatch: {}

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_BETTER_AUTH_URL: http://localhost:3000/
      VITE_SOCKET_URL: http://localhost:7001/
      VITE_RMHBOX_SOCKET_URL: http://localhost:7676/
      VITE_RMHTUBE_SOCKET_URL: http://localhost:7003/
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm run build:frontend
      - name: Report bundle size
        run: |
          set -uo pipefail
          client_dir=".output/public"
          [ -d "${client_dir}" ] || client_dir=".output"
          total="$(du -sh "${client_dir}" 2>/dev/null | cut -f1 || echo '?')"
          {
            echo '### Client bundle size'
            echo ''
            echo "Total (${client_dir}): **${total}**"
            echo ''
            echo 'Largest files:'
            echo '```'
            find "${client_dir}" -type f \( -name '*.js' -o -name '*.css' \) -printf '%s\t%p\n' 2>/dev/null \
              | sort -rn | head -25 | awk '{ printf "%8.1f KB  %s\n", $1/1024, $2 }'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
