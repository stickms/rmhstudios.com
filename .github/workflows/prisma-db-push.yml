# ─────────────────────────────────────────────────────────────────────────────
# Applies the Prisma schema to a throwaway PostgreSQL via `prisma db push`,
# proving the ~199-model schema is internally consistent and applies cleanly to a
# real database (catches issues `prisma validate` can't, e.g. unsupported column
# types or index conflicts).
# ─────────────────────────────────────────────────────────────────────────────
name: prisma-db-push

on:
  pull_request:
    paths:
      - "prisma/**"
      - ".github/workflows/prisma-db-push.yml"
  push:
    branches: [main]
    paths:
      - "prisma/**"
  workflow_dispatch: {}

concurrency:
  group: prisma-db-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  db-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rmh
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rmh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply schema to a fresh database
        run: pnpm db:push
