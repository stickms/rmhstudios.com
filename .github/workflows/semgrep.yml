# ─────────────────────────────────────────────────────────────────────────────
# Semgrep — rule-based SAST across the codebase (auto ruleset picks language- and
# framework-appropriate rules). Uploads SARIF to Security → Code scanning.
# Non-blocking; complements CodeQL's deeper data-flow analysis.
# ─────────────────────────────────────────────────────────────────────────────
name: semgrep

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 3"
  workflow_dispatch: {}

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install semgrep==1.97.0
      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep.sarif --error --quiet || true
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
