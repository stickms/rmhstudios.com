# ─────────────────────────────────────────────────────────────────────────────
# gitleaks — scans the full git history and each PR for committed secrets (API
# keys, tokens, private keys). Free for personal/public repos; organizations need
# a GITLEAKS_LICENSE secret. Pairs with GitHub's native push protection.
# ─────────────────────────────────────────────────────────────────────────────
name: gitleaks

on:
  pull_request: {}
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so history-wide secret detection works.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
