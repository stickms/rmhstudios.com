# ─────────────────────────────────────────────────────────────────────────────
# gitleaks — scans the checkout for committed secrets (API keys, tokens, private
# keys). Pairs with GitHub's native push protection and the verified-secret
# TruffleHog scan.
#
# Runs the gitleaks CLI directly instead of gitleaks-action@v2: that action
# phones home to a license server on every run, and when that server is
# unreachable it *enforces* licensing and fails the build (the "missing gitleaks
# license" / "No server is currently available" red X). The CLI has no such
# dependency — it fails only when it actually finds a secret.
# ─────────────────────────────────────────────────────────────────────────────
name: gitleaks

on:
  pull_request: {}
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so history-wide secret detection works.
          fetch-depth: 0

      - name: Run gitleaks (CLI)
        # Pinned version (matches this repo's action-pinning hygiene) so the
        # download URL is stable and there's no license/API round-trip to flake.
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version
          # Scan the working tree (--no-git) rather than full history: it catches
          # any secret present in the checked-out code and can't red-gate on an
          # old commit unrelated to the change. Exits non-zero (fails the job)
          # only when a secret is found; --redact keeps values out of the logs.
          /tmp/gitleaks detect --no-git --source . --redact --no-banner
