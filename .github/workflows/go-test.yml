# ─────────────────────────────────────────────────────────────────────────────
# Runs the Go unit tests with the standard toolchain (`go test -short ./...`),
# complementing the Bazel-driven test job in go-microservices.yml. Report-only
# (published to the summary) so environment-dependent integration tests that
# don't honor -short don't red-gate; the Bazel + e2e jobs own the hard gate.
# ─────────────────────────────────────────────────────────────────────────────
name: go-test

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-test.yml"
  workflow_dispatch: {}

concurrency:
  group: go-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum
      - name: go test
        run: |
          set -uo pipefail
          {
            echo '### go test -short ./...'
            echo ''
            echo '```'
            go test -short ./... 2>&1 | tail -200 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
