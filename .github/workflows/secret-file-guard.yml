# ─────────────────────────────────────────────────────────────────────────────
# Guard against committed secret material — real .env files, private keys, and
# keystores tracked in git (`.env.example*` is allowed). Complements gitleaks
# (which scans file contents) by catching secret-bearing files by path.
# ─────────────────────────────────────────────────────────────────────────────
name: secret-file-guard

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: secret-file-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for tracked secret files
        run: |
          set -uo pipefail
          bad="$(git ls-files \
            | grep -E '(^|/)\.env($|\.)|\.(pem|p12|pfx|keystore)$|(^|/)id_rsa($|\.|$)' \
            | grep -vE '\.env\.example' || true)"
          if [ -n "${bad}" ]; then
            echo "::error::Potential secret files are tracked in git:"
            echo "${bad}"
            exit 1
          fi
          echo "No secret-bearing files tracked."
