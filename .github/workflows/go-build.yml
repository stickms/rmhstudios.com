# ─────────────────────────────────────────────────────────────────────────────
# Compiles the Go fleet with the standard toolchain (`go build ./...`) — a fast,
# Bazel-independent check that every package still builds.
# ─────────────────────────────────────────────────────────────────────────────
name: go-build

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-build.yml"
  push:
    branches: [main]
    paths:
      - "go-services/**"
  workflow_dispatch: {}

concurrency:
  group: go-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum
      - name: go build
        run: go build ./...
