# ─────────────────────────────────────────────────────────────────────────────
# Docker image build + scan. Builds the slim web `runner` target (proving the
# Dockerfile still builds), scans the resulting image with Trivy (SARIF →
# Security tab), and generates an SPDX SBOM artifact. Heavy (full Vite build), so
# it runs on pushes to main touching build inputs, a weekly schedule, and manual
# dispatch — NOT on every PR (see hadolint.yml for the fast per-PR Dockerfile
# check). Build args are throwaway CI placeholders; nothing is pushed.
# ─────────────────────────────────────────────────────────────────────────────
name: docker-build

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build slim web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: runner
          load: true
          push: false
          tags: rmhstudios-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rmh
            BETTER_AUTH_SECRET=ci-not-a-real-secret-000000000000000000000000
            BETTER_AUTH_URL=http://localhost:3000/
            VITE_BETTER_AUTH_URL=http://localhost:3000/
            VITE_SOCKET_URL=http://localhost:7001/
            VITE_RMHBOX_SOCKET_URL=http://localhost:7676/
            VITE_RMHTUBE_SOCKET_URL=http://localhost:7003/
            VITE_DISCORD_ACTIVITY_CLIENT_ID=ci
            VITE_CDN_BASE_URL=

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: rmhstudios-web:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: rmhstudios-web:ci
          format: spdx-json
          output-file: sbom-web.spdx.json
          artifact-name: sbom-web.spdx.json
