# ─────────────────────────────────────────────────────────────────────────────
# Enforces that a Content-Security-Policy is defined in the Apache vhost — the
# production front door. (The Helm/Traefik serving path was removed in the
# rewrite, design §5.2, so Apache is now the only path to keep in sync.)
# Static check (no app boot).
# ─────────────────────────────────────────────────────────────────────────────
name: security-headers

on:
  pull_request:
    paths:
      - "deploy/apache/**"
      - ".github/workflows/security-headers.yml"
  push:
    branches: [main]
    paths:
      - "deploy/apache/**"
  workflow_dispatch: {}

concurrency:
  group: security-headers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  assert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert CSP present in the Apache vhost
        run: |
          set -uo pipefail
          apache='deploy/apache/rmhstudios.conf'
          if [ ! -f "${apache}" ]; then
            echo "::error::expected file missing: ${apache}"; exit 1
          fi
          if ! grep -qiE 'content-?security-?policy' "${apache}"; then
            echo "::error::no Content-Security-Policy directive in ${apache}"; exit 1
          fi
          echo "Content-Security-Policy present in the Apache vhost."
