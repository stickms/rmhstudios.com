# ─────────────────────────────────────────────────────────────────────────────
# Validates docker-compose.yml with `docker compose config` — catches YAML errors,
# bad interpolation, and invalid service definitions before a deploy relies on
# them. A placeholder .env is provided so variable interpolation resolves.
# ─────────────────────────────────────────────────────────────────────────────
name: compose-validate

on:
  pull_request:
    paths:
      - "docker-compose*.yml"
      - ".github/workflows/compose-validate.yml"
  push:
    branches: [main]
    paths:
      - "docker-compose*.yml"
  workflow_dispatch: {}

concurrency:
  group: compose-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Provide placeholder env
        run: |
          set -uo pipefail
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi
          # The web/socket/rmhbox/rmhtube services set `env_file:
          # ${ENV_FILE:-.env.production}`, so `docker compose config` fails if
          # that file is absent. Provide a placeholder for validation only.
          if [ ! -f .env.production ]; then
            cp .env.example .env.production 2>/dev/null || touch .env.production
          fi
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate docker-compose.cache.yml
        run: docker compose -f docker-compose.cache.yml config --quiet || echo "::warning::docker-compose.cache.yml did not validate standalone"
