# ─────────────────────────────────────────────────────────────────────────────
# madge — detects circular imports across lib/ · components/ · app/. Circular
# dependencies cause subtle init-order and tree-shaking bugs. Report-only.
# ─────────────────────────────────────────────────────────────────────────────
name: madge-circular

on:
  pull_request:
    paths:
      - "lib/**"
      - "components/**"
      - "app/**"
      - ".github/workflows/madge-circular.yml"
  workflow_dispatch: {}

concurrency:
  group: madge-circular-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  madge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Detect circular dependencies
        run: |
          set -uo pipefail
          {
            echo '### madge — circular dependencies'
            echo ''
            echo '```'
            pnpm dlx madge@8 --extensions ts,tsx --ts-config tsconfig.json \
              --circular lib components app 2>&1 | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
