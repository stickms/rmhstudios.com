# ─────────────────────────────────────────────────────────────────────────────
# knip — reports unused files, unused exports, and unused/undeclared dependencies.
# Report-only (published to the run summary): a large codebase always has some
# intentional dead-looking code, so this informs cleanup without gating.
# ─────────────────────────────────────────────────────────────────────────────
name: knip

on:
  pull_request:
    paths-ignore:
      - "go-services/**"
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}

concurrency:
  group: knip-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run knip
        run: |
          set -uo pipefail
          {
            echo '### knip — unused files / exports / dependencies'
            echo ''
            echo '```'
            pnpm dlx knip@5 --no-exit-code 2>&1 | head -400
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
