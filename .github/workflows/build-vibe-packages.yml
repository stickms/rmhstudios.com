# ─────────────────────────────────────────────────────────────────────────────
# Builds the "vibe packages" (the first stage of `pnpm build`) on its own, so a
# break in that generator is caught fast without waiting on the full Vite build.
# ─────────────────────────────────────────────────────────────────────────────
name: build-vibe-packages

on:
  pull_request:
    paths:
      - "scripts/build-vibe-packages.ts"
      - "lib/**"
      - "components/**"
      - ".github/workflows/build-vibe-packages.yml"
  push:
    branches: [main]
    paths:
      - "scripts/build-vibe-packages.ts"
  workflow_dispatch: {}

concurrency:
  group: build-vibe-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build vibe packages
        run: pnpm run build-vibe-packages
