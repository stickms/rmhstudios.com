# ─────────────────────────────────────────────────────────────────────────────
# Manually builds the "vibe packages" in isolation for debugging. Pull requests
# are already covered by web-ci's `pnpm run build:frontend`, whose first step is
# this exact generator; main deploys build the same cached Docker stage. Keeping
# a second automatic install/build consumed a runner without adding coverage.
# ─────────────────────────────────────────────────────────────────────────────
name: build-vibe-packages

on:
  workflow_dispatch: {}

concurrency:
  group: build-vibe-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      # Node 24 to match the production Dockerfile. Node < 21 lacks the global
      # `navigator`, which this generator needs to import browser-only libs
      # (pixi.js, p5) for their export names — on Node 20 they throw
      # "navigator is not defined" and the build fails.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build vibe packages
        run: pnpm run build-vibe-packages
