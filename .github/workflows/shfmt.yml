# ─────────────────────────────────────────────────────────────────────────────
# shfmt — reports shell-script formatting drift. Report-only (published to the
# summary as a diff).
# ─────────────────────────────────────────────────────────────────────────────
name: shfmt

on:
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shfmt.yml"
  workflow_dispatch: {}

concurrency:
  group: shfmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache: false
      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest
      - name: Check shell formatting
        run: |
          set -uo pipefail
          {
            echo '### shfmt — formatting diff'
            echo ''
            echo '```diff'
            find . -path ./node_modules -prune -o -name '*.sh' -print0 \
              | xargs -0 -r "$(go env GOPATH)/bin/shfmt" -d 2>&1 | head -300 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
