# ─────────────────────────────────────────────────────────────────────────────
# pr-reports — one job that runs all the REPORT-ONLY code-health checks and
# publishes each to the run summary. Consolidates eight former single-purpose
# workflows (knip, type-coverage, madge-circular, i18n-coverage, todo-scan,
# no-hardcoded-hex, server-import-guard, large-file-guard) into ONE checkout +
# ONE pnpm install, instead of eight separate runners each paying setup + a full
# install for a summary that never gates a merge.
#
# Every step is `continue-on-error` and writes to $GITHUB_STEP_SUMMARY, so this
# job is informational only — it does not fail PRs. (The pass/fail gates live in
# web-ci.yml.)
# ─────────────────────────────────────────────────────────────────────────────
name: pr-reports

on:
  pull_request:
    paths-ignore:
      - "go-services/**"
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}

concurrency:
  group: pr-reports-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      # postinstall runs `prisma generate` (schema-only). Shared by every report
      # step below (knip / type-coverage / i18n:coverage need the workspace).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: knip — unused files / exports / dependencies
        continue-on-error: true
        run: |
          set -uo pipefail
          {
            echo '### knip — unused files / exports / dependencies'
            echo ''
            echo '```'
            pnpm dlx knip@5 --no-exit-code 2>&1 | head -400
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: type-coverage
        continue-on-error: true
        run: |
          set -uo pipefail
          {
            echo '### type-coverage'
            echo ''
            echo '```'
            pnpm dlx type-coverage@2 --detail --at-least 0 2>&1 | tail -60
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: madge — circular dependencies
        continue-on-error: true
        run: |
          set -uo pipefail
          {
            echo '### madge — circular dependencies'
            echo ''
            echo '```'
            pnpm dlx madge@8 --extensions ts,tsx --ts-config tsconfig.json \
              --circular lib components app 2>&1 | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: i18n key coverage
        continue-on-error: true
        run: |
          set -uo pipefail
          {
            echo '### i18n key coverage'
            echo ''
            echo '```'
            pnpm i18n:coverage || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: TODO / FIXME / HACK markers
        continue-on-error: true
        run: |
          set -uo pipefail
          matches="$(grep -rnE '\b(TODO|FIXME|HACK|XXX)\b' app components lib server hooks stores \
            --include='*.ts' --include='*.tsx' 2>/dev/null || true)"
          count="$(printf '%s\n' "${matches}" | grep -c . || true)"
          echo "Markers found: ${count}"
          {
            echo "### TODO / FIXME / HACK markers: ${count}"
            echo ''
            echo '```'
            printf '%s\n' "${matches}" | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Hardcoded hex colors (design-token drift)
        continue-on-error: true
        run: |
          set -uo pipefail
          matches="$(grep -rniE '#[0-9a-f]{3}([0-9a-f]{3})?\b' components app \
            --include='*.tsx' --include='*.ts' 2>/dev/null || true)"
          count="$(printf '%s\n' "${matches}" | grep -c . || true)"
          echo "Hardcoded hex occurrences: ${count}"
          {
            echo "### Hardcoded hex colors: ${count}"
            echo ''
            echo '```'
            printf '%s\n' "${matches}" | head -100
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Server-only imports in client code
        continue-on-error: true
        run: |
          set -uo pipefail
          matches="$(grep -rnE "from ['\"][^'\"]*\.server['\"]" components stores hooks 2>/dev/null || true)"
          if [ -n "${matches}" ]; then
            echo "::warning::Client code imports server-only (.server) modules:"
            echo "${matches}"
            {
              echo '### ⚠️ Server-only imports in client code'
              echo ''
              echo '```'
              echo "${matches}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No .server imports found in client component code."
          fi

      - name: Tracked files over 5 MB
        continue-on-error: true
        run: |
          set -uo pipefail
          big="$(git ls-files -z | xargs -0 -r du -b 2>/dev/null \
            | awk '$1 > 5242880' | sort -rn || true)"
          if [ -n "${big}" ]; then
            {
              echo '### Tracked files over 5 MB'
              echo ''
              echo '```'
              echo "${big}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No tracked files over 5 MB."
          fi
