# ─────────────────────────────────────────────────────────────────────────────
# CodeQL static analysis (SAST) — scans the JS/TS app and the Go fleet for
# injection, auth, and data-flow vulnerabilities on PRs, pushes to main, and a
# weekly schedule. Results surface in the repo's Security → Code scanning tab.
# GitHub-native; requires no secrets. Pair with secret-scanning + push
# protection (enable in repo Settings → Code security).
# ─────────────────────────────────────────────────────────────────────────────
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 07:00 UTC — catches advisories in code that hasn't changed.
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: autobuild
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:${{ matrix.language }}"
