# ─────────────────────────────────────────────────────────────────────────────
# Guard: client component code must not import server-only (*.server) modules —
# a Vite plugin stubs those out of the client bundle, so an import from client
# code is a latent breakage. Route/loader/API code under app/ legitimately uses
# them, so only components/ · stores/ · hooks/ are scanned. Report-only.
# ─────────────────────────────────────────────────────────────────────────────
name: server-import-guard

on:
  pull_request:
    paths:
      - "components/**"
      - "stores/**"
      - "hooks/**"
      - ".github/workflows/server-import-guard.yml"
  push:
    branches: [main]
    paths:
      - "components/**"
      - "stores/**"
      - "hooks/**"
  workflow_dispatch: {}

concurrency:
  group: server-import-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan client code for .server imports
        run: |
          set -uo pipefail
          matches="$(grep -rnE "from ['\"][^'\"]*\.server['\"]" components stores hooks 2>/dev/null || true)"
          if [ -n "${matches}" ]; then
            echo "::warning::Client code imports server-only (.server) modules:"
            echo "${matches}"
            {
              echo '### ⚠️ Server-only imports in client code'
              echo ''
              echo '```'
              echo "${matches}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No .server imports found in client component code."
          fi
