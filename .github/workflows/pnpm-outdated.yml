# ─────────────────────────────────────────────────────────────────────────────
# Reports outdated npm dependencies (current vs. wanted vs. latest) to the run
# summary — a dependency-freshness signal alongside Dependabot. Report-only.
# ─────────────────────────────────────────────────────────────────────────────
name: pnpm-outdated

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch: {}

concurrency:
  group: pnpm-outdated-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  outdated:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Report outdated dependencies
        run: |
          set -uo pipefail
          {
            echo '### pnpm outdated'
            echo ''
            echo '```'
            pnpm outdated 2>&1 | head -300 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
