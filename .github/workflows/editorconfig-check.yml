# ─────────────────────────────────────────────────────────────────────────────
# editorconfig-checker — verifies files honor .editorconfig (indent style, final
# newline, trailing whitespace, charset). Report-only, published to the summary.
# ─────────────────────────────────────────────────────────────────────────────
name: editorconfig-check

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch: {}

concurrency:
  group: editorconfig-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.23"
          cache: false
      - name: Install editorconfig-checker
        run: go install github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@latest
      - name: Run editorconfig-checker
        run: |
          set -uo pipefail
          {
            echo '### editorconfig-checker'
            echo ''
            echo '```'
            "$(go env GOPATH)/bin/editorconfig-checker" 2>&1 | head -300 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
