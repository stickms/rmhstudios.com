# ─────────────────────────────────────────────────────────────────────────────
# Trivy filesystem scan — vulnerable dependencies (reads pnpm-lock.yaml / go.sum),
# IaC/Dockerfile/compose/Helm misconfigurations, and hardcoded secrets in one
# pass. Results upload as SARIF to Security → Code scanning. Report-only
# (exit-code 0): findings are surfaced for triage, they don't fail the build.
# ─────────────────────────────────────────────────────────────────────────────
name: trivy-fs

on:
  pull_request: {}
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

concurrency:
  group: trivy-fs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # secret scanning intentionally omitted — gitleaks (pattern) and
          # trufflehog (verified) are the dedicated secret scanners; Trivy's
          # secret mode was pure overlap. Keep vuln + IaC/misconfig here.
          scanners: vuln,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
        env:
          TRIVY_SKIP_DIRS: node_modules

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
