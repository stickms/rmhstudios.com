# ─────────────────────────────────────────────────────────────────────────────
# go vet — reports suspicious constructs the compiler accepts (bad Printf verbs,
# unreachable code, lock-by-value, struct-tag typos) across the Go fleet.
# ─────────────────────────────────────────────────────────────────────────────
name: go-vet

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-vet.yml"
  push:
    branches: [main]
    paths:
      - "go-services/**"
  workflow_dispatch: {}

concurrency:
  group: go-vet-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vet:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum

      - name: go vet
        run: go vet ./...
