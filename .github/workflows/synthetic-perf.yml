name: synthetic-perf

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: synthetic-perf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0

      - name: Run synthetic Lighthouse probes
        run: |
          set -euo pipefail
          mkdir -p .lighthouseci
          runs="$(node -p "require('./scripts/ci/synthetic-perf-bands.json').lighthouseRuns")"
          urls=()
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            urls+=("--url=$url")
          done < <(node -e "const c=require('./scripts/ci/synthetic-perf-bands.json');for(const u of c.urls) console.log(u.url)")
          [ "${#urls[@]}" -gt 0 ]
          npx -y @lhci/cli@0.15.1 collect \
            "${urls[@]}" \
            --numberOfRuns="$runs" \
            --settings.chromeFlags="--headless=new --no-sandbox"

      - name: Enforce regression bands
        run: node scripts/ci/synthetic-perf-report.mjs

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: synthetic-perf-lighthouse
          path: .lighthouseci
          if-no-files-found: error
          retention-days: 14

  cloudflare-cache-rule-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.18.0
      - name: Verify Cloudflare cache-rule drift
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          VERIFY_ONLY: '1'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "::notice::Cloudflare drift check skipped: configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ZONE_ID."
            exit 0
          fi
          bash deploy/apply-cloudflare-cache-rules.sh
