# ─────────────────────────────────────────────────────────────────────────────
# Checks the pull-request title follows Conventional Commits (feat|fix|docs|…).
# Report-only (posts a warning + summary note) so it guides without blocking. The
# title is read via an env var, never interpolated into the shell.
# ─────────────────────────────────────────────────────────────────────────────
name: pr-title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -uo pipefail
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: .+'
          if printf '%s' "${TITLE}" | grep -qE "${pattern}"; then
            echo "PR title follows Conventional Commits: ${TITLE}"
          else
            echo "::warning::PR title is not a Conventional Commit: '${TITLE}'"
            {
              echo '### PR title'
              echo ''
              echo "\"${TITLE}\" does not follow Conventional Commits."
              echo 'Expected a type prefix, e.g. feat(feed): ..., fix: ..., ci: ...'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
