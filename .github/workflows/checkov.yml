# ─────────────────────────────────────────────────────────────────────────────
# Checkov — IaC security/misconfiguration scanning across the Dockerfile, Helm
# charts, Kubernetes manifests, Terraform, and the GitHub Actions workflows.
# Uploads SARIF to Security → Code scanning. Non-blocking.
# ─────────────────────────────────────────────────────────────────────────────
name: checkov

on:
  pull_request:
    paths:
      - "deploy/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/**"
      - ".github/workflows/checkov.yml"
  push:
    branches: [main]
    paths:
      - "deploy/**"
      - "Dockerfile"
  schedule:
    - cron: "0 8 * * 4"
  workflow_dispatch: {}

concurrency:
  group: checkov-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Checkov
        run: pip install checkov==3.2.334
      - name: Run Checkov
        run: |
          set -uo pipefail
          checkov -d . \
            --framework dockerfile,kubernetes,helm,terraform,github_actions \
            --compact --quiet \
            -o sarif --output-file-path checkov_out || true
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: checkov_out/results_sarif.sarif
          category: checkov
