# ─────────────────────────────────────────────────────────────────────────────
# Inventories TODO / FIXME / HACK / XXX markers across the TypeScript source and
# publishes the list to the run summary. Report-only — visibility, not a gate.
# ─────────────────────────────────────────────────────────────────────────────
name: todo-scan

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "server/**"
      - ".github/workflows/todo-scan.yml"
  workflow_dispatch: {}

concurrency:
  group: todo-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan for TODO / FIXME markers
        run: |
          set -uo pipefail
          matches="$(grep -rnE '\b(TODO|FIXME|HACK|XXX)\b' app components lib server hooks stores \
            --include='*.ts' --include='*.tsx' 2>/dev/null || true)"
          count="$(printf '%s\n' "${matches}" | grep -c . || true)"
          echo "Markers found: ${count}"
          {
            echo "### TODO / FIXME / HACK markers: ${count}"
            echo ''
            echo '```'
            printf '%s\n' "${matches}" | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
