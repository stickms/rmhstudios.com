# ─────────────────────────────────────────────────────────────────────────────
# Broken-link check — runs lychee over the repo's Markdown (README, docs, the
# per-directory CLAUDE.md guides) and reports dead internal and external links.
# Non-blocking (`fail: false`) because external links flake; the report is
# published to the run summary for triage.
# ─────────────────────────────────────────────────────────────────────────────
name: link-check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Link check
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: "--no-progress --max-concurrency 4 --exclude-mail './**/*.md'"
          output: ./lychee-report.md
          fail: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish report to summary
        if: always()
        run: cat ./lychee-report.md >> "$GITHUB_STEP_SUMMARY" || true
