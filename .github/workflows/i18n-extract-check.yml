# ─────────────────────────────────────────────────────────────────────────────
# Runs the i18next extraction and reports whether it would add or remove keys —
# i.e. whether new t() strings were added without running `pnpm i18n:extract`.
# Report-only; the working tree is restored afterward.
# ─────────────────────────────────────────────────────────────────────────────
name: i18n-extract-check

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "locales/en/**"
      - ".github/workflows/i18n-extract-check.yml"
  workflow_dispatch: {}

concurrency:
  group: i18n-extract-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run extraction and diff
        run: |
          set -uo pipefail
          pnpm i18n:extract || true
          if git diff --quiet -- locales; then
            echo "i18n extraction is up to date."
          else
            {
              echo '### i18n:extract produced uncommitted changes'
              echo ''
              echo 'Run pnpm i18n:extract locally and commit the result.'
              echo ''
              echo '```diff'
              git --no-pager diff -- locales | head -300
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            git checkout -- locales
          fi
