# ─────────────────────────────────────────────────────────────────────────────
# yamllint — checks YAML (workflows, Helm charts, compose) for syntax issues and
# style problems (indentation, duplicate keys, truthy typos). Relaxed ruleset,
# report-only.
# ─────────────────────────────────────────────────────────────────────────────
name: yamllint

on:
  pull_request:
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/yamllint.yml"
  workflow_dispatch: {}

concurrency:
  group: yamllint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install yamllint==1.35.1
      - name: Run yamllint
        run: |
          set -uo pipefail
          {
            echo '### yamllint'
            echo ''
            echo '```'
            yamllint -d relaxed .github 2>&1 | head -300 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
