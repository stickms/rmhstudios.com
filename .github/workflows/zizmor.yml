# ─────────────────────────────────────────────────────────────────────────────
# zizmor — security audit for the GitHub Actions workflows: detects script
# injection, over-broad GITHUB_TOKEN permissions, unpinned/dangerous action refs,
# and template-injection sinks. Results upload as SARIF to Security → Code
# scanning. Report-only so it surfaces issues without blocking.
# ─────────────────────────────────────────────────────────────────────────────
name: zizmor

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches: [main]
    paths:
      - ".github/**"
  schedule:
    - cron: "0 8 * * 2"
  workflow_dispatch: {}

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install zizmor
        run: pip install zizmor==1.27.0

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor --format sarif . > zizmor.sarif || true

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor
