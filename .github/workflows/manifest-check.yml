# ─────────────────────────────────────────────────────────────────────────────
# Validates the PWA web app manifest (public/manifest.webmanifest): parses as
# JSON and carries the required install keys (name, icons, start_url).
# ─────────────────────────────────────────────────────────────────────────────
name: manifest-check

on:
  pull_request:
    paths:
      - "public/manifest.webmanifest"
      - ".github/workflows/manifest-check.yml"
  push:
    branches: [main]
    paths:
      - "public/manifest.webmanifest"
  workflow_dispatch: {}

concurrency:
  group: manifest-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Validate web app manifest
        run: |
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("public/manifest.webmanifest", "utf8"));
            const missing = ["name", "icons", "start_url"].filter((k) => !(k in m));
            if (missing.length) {
              console.error("Missing required manifest keys:", missing.join(", "));
              process.exit(1);
            }
            if (!Array.isArray(m.icons) || m.icons.length === 0) {
              console.error("manifest.icons must be a non-empty array");
              process.exit(1);
            }
            console.log("Web app manifest is valid.");
          '
