# ─────────────────────────────────────────────────────────────────────────────
# codespell — catches common spelling mistakes in the documentation. Scoped to
# docs/ and top-level Markdown to avoid code-identifier false positives.
# Report-only.
# ─────────────────────────────────────────────────────────────────────────────
name: spell-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - ".github/workflows/spell-check.yml"
  workflow_dispatch: {}

concurrency:
  group: spell-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codespell:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install codespell
        run: pip install codespell==2.3.0
      - name: Run codespell
        run: |
          set -uo pipefail
          {
            echo '### codespell'
            echo ''
            echo '```'
            codespell docs ./*.md --skip='*.lock,*.min.*' 2>&1 | head -300 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
