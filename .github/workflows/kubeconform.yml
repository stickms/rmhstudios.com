# ─────────────────────────────────────────────────────────────────────────────
# Renders the Helm chart and validates the resulting Kubernetes manifests against
# the upstream API schemas with kubeconform (missing/unknown fields, wrong types).
# CRDs (e.g. Traefik middlewares) are skipped via --ignore-missing-schemas.
# Report-only.
# ─────────────────────────────────────────────────────────────────────────────
name: kubeconform

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/kubeconform.yml"
  workflow_dispatch: {}

concurrency:
  group: kubeconform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache: false
      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@latest
      - name: Render + validate manifests
        run: |
          set -uo pipefail
          {
            echo '### kubeconform — rendered manifest validation'
            echo ''
            echo '```'
            helm template deploy/helm/rmhstudios-go 2>/dev/null \
              | "$(go env GOPATH)/bin/kubeconform" -strict -summary -ignore-missing-schemas 2>&1 \
              | head -120 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
