# ─────────────────────────────────────────────────────────────────────────────
# Verifies go.mod / go.sum are tidy — `go mod tidy` must produce no diff. Keeps
# the module graph honest (no missing or superfluous requirements).
# ─────────────────────────────────────────────────────────────────────────────
name: go-mod-tidy

on:
  pull_request:
    paths:
      - "go-services/go.mod"
      - "go-services/go.sum"
      - "go-services/**/*.go"
      - ".github/workflows/go-mod-tidy.yml"
  workflow_dispatch: {}

concurrency:
  group: go-mod-tidy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum
      - name: go mod tidy (no diff)
        run: |
          set -uo pipefail
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy — run 'go mod tidy' and commit."
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi
          echo "go.mod/go.sum are tidy."
