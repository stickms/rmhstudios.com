# ─────────────────────────────────────────────────────────────────────────────
# PR auto-labeler — applies area labels (app, lib, go, ci, docs, …) based on the
# paths a pull request touches, driven by .github/labeler.yml. Uses
# pull_request_target so it can label PRs from forks; the action only reads the
# changed-file list (it never checks out or runs PR code), so this is safe.
# ─────────────────────────────────────────────────────────────────────────────
name: labeler

on:
  pull_request_target: {}

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
