# ─────────────────────────────────────────────────────────────────────────────
# go-licenses — inventories the licenses of the Go dependency tree so incompatible
# or unexpected licenses are visible. Report-only, published to the summary.
# ─────────────────────────────────────────────────────────────────────────────
name: go-licenses

on:
  pull_request:
    paths:
      - "go-services/go.mod"
      - "go-services/go.sum"
      - ".github/workflows/go-licenses.yml"
  schedule:
    - cron: "0 7 * * 5"
  workflow_dispatch: {}

concurrency:
  group: go-licenses-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: Report dependency licenses
        run: |
          set -uo pipefail
          {
            echo '### Go dependency licenses'
            echo ''
            echo '```'
            "$(go env GOPATH)/bin/go-licenses" report ./... 2>/dev/null | head -300 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
