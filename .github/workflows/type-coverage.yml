# ─────────────────────────────────────────────────────────────────────────────
# type-coverage — measures the share of the codebase with non-`any` types and
# reports the weakest spots. Report-only; a good metric to ratchet upward over
# time (add `--at-least <pct>` to turn it into a gate later).
# ─────────────────────────────────────────────────────────────────────────────
name: type-coverage

on:
  pull_request:
    paths-ignore:
      - "go-services/**"
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}

concurrency:
  group: type-coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  type-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Measure type coverage
        run: |
          set -uo pipefail
          {
            echo '### type-coverage'
            echo ''
            echo '```'
            pnpm dlx type-coverage@2 --detail --at-least 0 2>&1 | tail -60
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
