# ─────────────────────────────────────────────────────────────────────────────
# gofmt check for the Go microservice fleet. Fails if any file under go-services/
# is not gofmt-clean. Complements the Bazel build/test in go-microservices.yml.
# ─────────────────────────────────────────────────────────────────────────────
name: go-fmt

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-fmt.yml"
  push:
    branches: [main]
    paths:
      - "go-services/**"
  workflow_dispatch: {}

concurrency:
  group: go-fmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gofmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum

      - name: Check gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "::error::The following Go files are not gofmt-clean:"
            echo "${unformatted}"
            exit 1
          fi
          echo "All Go files are gofmt-clean."
