# ─────────────────────────────────────────────────────────────────────────────
# gosec — security-focused static analysis for Go (SQL injection, weak crypto,
# unhandled errors on security-relevant calls, path traversal). Uploads SARIF to
# Security → Code scanning. Non-blocking.
# ─────────────────────────────────────────────────────────────────────────────
name: go-gosec

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-gosec.yml"
  push:
    branches: [main]
    paths:
      - "go-services/**"
  schedule:
    - cron: "0 7 * * 4"
  workflow_dispatch: {}

concurrency:
  group: go-gosec-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    defaults:
      run:
        working-directory: go-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: |
          set -uo pipefail
          "$(go env GOPATH)/bin/gosec" -no-fail -fmt sarif \
            -out "${GITHUB_WORKSPACE}/gosec.sarif" ./... || true
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: gosec.sarif
          category: gosec
