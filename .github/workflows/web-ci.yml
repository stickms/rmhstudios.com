# ─────────────────────────────────────────────────────────────────────────────
# Frontend CI gate — the standard local checks on every PR and push, so a broken
# frontend change can't land silently. No secrets/env required.
#
# Split into PARALLEL jobs (typecheck+lint+test / build / audit) that each do
# their own frozen install off the shared pnpm store cache (~10s warm). This
# means:
#   • the full production Build runs on EVERY PR regardless of the test result —
#     it used to sit AFTER the test step in one job, so a red test (or the known
#     i18n-catalogs drift) skipped it and pre-merge build breakage slipped
#     through to the deploy;
#   • wall-clock ≈ the slowest single job (~the build), not the sum of all four.
# ─────────────────────────────────────────────────────────────────────────────
name: web-ci

on:
  pull_request:
    paths-ignore:
      - "go-services/**"
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  # NOTE: intentionally NO `push:` trigger. On a push to main, deploy.yml already
  # runs the SAME typecheck/lint/test as its in-workflow `ci` job AND builds the
  # real Docker image (which catches any build-time breakage) — so a push-run of
  # web-ci here was a pure duplicate of ~3 jobs. Under the account-wide concurrent
  # runner cap that duplicate could queue AHEAD of deploy's `build`, delaying the
  # release. PRs are still fully gated below; main is reached only via PR, so the
  # checks have already run on the PR head. (`audit` likewise ran on the PR.)
  workflow_dispatch: {}

# Newer pushes to the same ref cancel older in-progress runs.
concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (checkout) to typecheck/lint/test/build.
permissions:
  contents: read

jobs:
  # Typecheck + lint + unit tests. tsc/vitest exceed Node's default ~4 GB heap,
  # so the larger heap is set job-wide.
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      # Node 24 to match the production Dockerfile (node:24-alpine). Node < 21
      # lacks the global `navigator`, which build-vibe-packages needs to import
      # browser-only libs (pixi.js, p5) for their export names.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      # postinstall runs `prisma generate` (schema-only, no DB needed).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Persist tsc's incremental program graph (.tsbuildinfo) and eslint's result
      # cache across runs so warm runs only re-check files that actually changed.
      # Keyed per-commit with a prefix restore-key, so each run restores the most
      # recent cache and saves a fresh one. Both tools invalidate entries by file
      # CONTENT (tsc hashes; eslint --cache-strategy content), so a restored cache
      # can only ever make a check FASTER, never wrong.
      - name: Restore typecheck/lint caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .cache/tsc
            .cache/eslint
          key: tsc-eslint-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            tsc-eslint-${{ runner.os }}-
      # `mkdir -p` so a cold cache (miss on the restore above) still has the dirs
      # tsc/eslint write their cache files into.
      - name: Typecheck
        run: |
          mkdir -p .cache/tsc
          pnpm exec tsc --noEmit --incremental --tsBuildInfoFile .cache/tsc/app.tsbuildinfo
      - name: Lint
        run: |
          mkdir -p .cache/eslint
          pnpm exec eslint --cache --cache-location .cache/eslint/eslintcache --cache-strategy content
      # Advisory (warn, don't block): a red test surfaces in the step summary and
      # turns this step's own annotation red, but no longer fails the `check` job
      # — typecheck + lint above remain hard gates. Keep real regressions honest
      # by reading the run; this trades enforcement for not stopping the pipeline.
      - name: Test
        run: pnpm exec vitest run
        continue-on-error: true

  # Full frontend build (vibe packages → vite). Catches build-time breakage that
  # typecheck alone misses. Runs independently of `check` so a red test never
  # hides a build failure. No runtime env is read at build time.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build:frontend
      # Warn-only payload-budget report (rewrite R0-T3). Reuses the build output
      # above; never gates the job until the frontend decomposition (R3) is done,
      # at which point `--strict` makes it blocking.
      - name: Bundle budget (warn-only)
        continue-on-error: true
        run: pnpm exec tsx scripts/ci/bundle-budget.ts

  # Production dependency vulnerability audit. Fast; kept separate so it never
  # gates (or is gated by) the build/test.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high
