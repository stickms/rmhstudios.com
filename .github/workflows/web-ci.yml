# ─────────────────────────────────────────────────────────────────────────────
# Frontend CI gate — the standard local checks on every PR and push, so a broken
# frontend change can't land silently. No secrets/env required.
#
# Split into PARALLEL jobs (typecheck+lint+test / build / audit) that each do
# their own frozen install off the shared pnpm store cache (~10s warm). This
# means:
#   • the full production Build runs on EVERY PR regardless of the test result —
#     it used to sit AFTER the test step in one job, so a red test (or the known
#     i18n-catalogs drift) skipped it and pre-merge build breakage slipped
#     through to the deploy;
#   • wall-clock ≈ the slowest single job (~the build), not the sum of all four.
# ─────────────────────────────────────────────────────────────────────────────
name: web-ci

on:
  pull_request:
    paths-ignore:
      - "go-services/**"
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "go-services/**"
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}

# Newer pushes to the same ref cancel older in-progress runs.
concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (checkout) to typecheck/lint/test/build.
permissions:
  contents: read

jobs:
  # Typecheck + lint + unit tests. tsc/vitest exceed Node's default ~4 GB heap,
  # so the larger heap is set job-wide.
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      # Node 24 to match the production Dockerfile (node:24-alpine). Node < 21
      # lacks the global `navigator`, which build-vibe-packages needs to import
      # browser-only libs (pixi.js, p5) for their export names.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      # postinstall runs `prisma generate` (schema-only, no DB needed).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm exec vitest run

  # Full frontend build (vibe packages → vite). Catches build-time breakage that
  # typecheck alone misses. Runs independently of `check` so a red test never
  # hides a build failure. No runtime env is read at build time.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build:frontend
      # Warn-only payload-budget report (rewrite R0-T3). Reuses the build output
      # above; never gates the job until the frontend decomposition (R3) is done,
      # at which point `--strict` makes it blocking.
      - name: Bundle budget (warn-only)
        continue-on-error: true
        run: pnpm exec tsx scripts/ci/bundle-budget.ts

  # Production dependency vulnerability audit. Fast; kept separate so it never
  # gates (or is gated by) the build/test.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high
