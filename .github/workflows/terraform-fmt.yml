# ─────────────────────────────────────────────────────────────────────────────
# Checks the Terraform under deploy/terraform is canonically formatted
# (`terraform fmt -check -recursive`).
# ─────────────────────────────────────────────────────────────────────────────
name: terraform-fmt

on:
  pull_request:
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/terraform-fmt.yml"
  push:
    branches: [main]
    paths:
      - "deploy/terraform/**"
  workflow_dispatch: {}

concurrency:
  group: terraform-fmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false
      - name: terraform fmt -check
        run: terraform fmt -check -recursive -diff deploy/terraform
