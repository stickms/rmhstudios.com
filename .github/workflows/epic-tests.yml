# ─────────────────────────────────────────────────────────────────────────────
# Runs the RMH "epic" build test suite (its own Vitest config, vitest.epic
# .config.ts) covering scripts/epic/* rendering, pagination, and manuscript
# validation — code the main test run does not include.
# ─────────────────────────────────────────────────────────────────────────────
name: epic-tests

on:
  pull_request:
    paths:
      - "scripts/epic/**"
      - "vitest.epic.config.ts"
      - ".github/workflows/epic-tests.yml"
  push:
    branches: [main]
    paths:
      - "scripts/epic/**"
  workflow_dispatch: {}

concurrency:
  group: epic-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run epic test suite
        run: pnpm epic:test
