# ─────────────────────────────────────────────────────────────────────────────
# govulncheck — scans the Go fleet against the Go vulnerability database, reporting
# only vulnerabilities in code paths actually reachable from the binaries. Results
# are uploaded as SARIF to the Security → Code scanning tab. Non-blocking: findings
# surface for triage but don't fail the build (upstream advisories are out of our
# immediate control).
# ─────────────────────────────────────────────────────────────────────────────
name: go-vuln

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-vuln.yml"
  push:
    branches: [main]
    paths:
      - "go-services/**"
  schedule:
    # Weekly, Tuesday 07:00 UTC — catches new advisories in unchanged code.
    - cron: "0 7 * * 2"
  workflow_dispatch: {}

concurrency:
  group: go-vuln-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache-dependency-path: go-services/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: go-services
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/govulncheck" -format sarif ./... > "${GITHUB_WORKSPACE}/govulncheck.sarif" || true

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
