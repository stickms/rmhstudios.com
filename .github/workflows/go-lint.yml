# ─────────────────────────────────────────────────────────────────────────────
# golangci-lint for the Go fleet. Runs on pull requests with `only-new-issues`
# so it flags problems introduced by the PR without red-gating on the pre-existing
# backlog (matching the repo's "don't add NEW warnings" bar).
#
# This is the UMBRELLA Go linter: its config (go-services/.golangci.yml) enables
# govet + staticcheck (default) + gofmt, so the former standalone go-vet / go-fmt
# / go-staticcheck / go-cyclo workflows were retired. Build + test live in Bazel
# (go-microservices.yml); gosec keeps go-gosec.yml for its Security-tab SARIF.
# ─────────────────────────────────────────────────────────────────────────────
name: go-lint

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-lint.yml"
  workflow_dispatch: {}

concurrency:
  group: go-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.23"
          # golangci-lint-action manages its own build/analysis cache.
          cache: false

      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          version: v1.64.8
          working-directory: go-services
          only-new-issues: true
