# ─────────────────────────────────────────────────────────────────────────────
# golangci-lint for the Go fleet. Runs on pull requests with `only-new-issues`
# so it flags problems introduced by the PR without red-gating on the pre-existing
# backlog (matching the repo's "don't add NEW warnings" bar).
# ─────────────────────────────────────────────────────────────────────────────
name: go-lint

on:
  pull_request:
    paths:
      - "go-services/**"
      - ".github/workflows/go-lint.yml"
  workflow_dispatch: {}

concurrency:
  group: go-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          # golangci-lint-action manages its own build/analysis cache.
          cache: false

      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          version: v1.64.8
          working-directory: go-services
          only-new-issues: true
