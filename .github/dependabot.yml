version: 2
updates:
  # JS/TS dependencies (pnpm). Grouped so related bumps land in one PR and the
  # weekly cadence keeps noise down. Majors are separated so they can be reviewed
  # more carefully than routine patch/minor bumps.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      types:
        patterns: ["@types/*"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "ci"]

  # Go microservices.
  - package-ecosystem: gomod
    directory: "/go-services"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "go"]
