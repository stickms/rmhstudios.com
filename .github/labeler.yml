# ─────────────────────────────────────────────────────────────────────────────
# Path-based PR auto-labeling (consumed by .github/workflows/labeler.yml).
# actions/labeler v5 syntax. Labels are created on first use.
# ─────────────────────────────────────────────────────────────────────────────

app:
  - changed-files:
      - any-glob-to-any-file: 'app/**'

components:
  - changed-files:
      - any-glob-to-any-file: 'components/**'

lib:
  - changed-files:
      - any-glob-to-any-file: 'lib/**'

server:
  - changed-files:
      - any-glob-to-any-file: 'server/**'

go:
  - changed-files:
      - any-glob-to-any-file:
          - 'go-services/**'
          - 'MODULE.bazel'
          - 'BUILD.bazel'

database:
  - changed-files:
      - any-glob-to-any-file:
          - 'prisma/**'
          - 'prisma.config.ts'

i18n:
  - changed-files:
      - any-glob-to-any-file:
          - 'locales/**'
          - 'i18next-parser.config.js'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'testing/**'
          - '**/*.test.ts'
          - '**/*.test.tsx'
          - '**/*.spec.ts'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

deploy:
  - changed-files:
      - any-glob-to-any-file:
          - 'deploy/**'
          - 'Dockerfile'
          - 'docker-compose*.yml'
          - 'deploy.sh'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '**/*.md'

styles:
  - changed-files:
      - any-glob-to-any-file:
          - 'app/globals.css'
          - '**/*.css'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'go-services/go.mod'
          - 'go-services/go.sum'
