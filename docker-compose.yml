services:
  db:
    image: postgres:15-alpine
    container_name: rmh-postgres-local
    restart: always
    environment:
      POSTGRES_USER: rmhuser
      POSTGRES_PASSWORD: rmhpassword
      POSTGRES_DB: rmhdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
