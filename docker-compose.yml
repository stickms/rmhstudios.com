# ─────────────────────────────────────────────────────────────────────────────
# rmhstudios.com — Docker Compose
#
# Used for BOTH production and staging via --project-name and --env-file:
#
#   Production:  docker compose -p rmhstudios-prod  --env-file .env.production  up -d
#   Staging:     docker compose -p rmhstudios-staging --env-file .env.staging   up -d
#
# Port assignments are set in the respective .env files:
#   Production:  7005 / 7001 / 7676 / 7003
#   Staging:     8005 / 8001 / 8676 / 8003
#
# TWO images are built from the SAME Dockerfile + build args (only the target
# stage differs):
#   - rmhstudios-app       (slim): web, socket, rmhbox, rmhtube  (Node, no Chromium)
#   - rmhstudios-app-full         : supervisor, status, assets  (+ Go bins, Chromium, git)
# The slim image is shared by the four Node services; the full image is shared by
# the three Go services. No redundant rebuilds — shared stages cache once.
#
# All four application services start independently in parallel for faster
# deployment. No artificial dependency ordering.
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  image: ${COMPOSE_PROJECT_NAME:-rmhstudios}-app:latest
  restart: unless-stopped
  init: true
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 512
  tmpfs:
    - /tmp:size=256m,mode=1777
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${STORAGE_PATH:-./db}:/app/db
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Shared BUILD config for both images. Factored out so the long arg list isn't
# duplicated and the slim (`runner`) and full (`runner-full`) images can never
# drift apart — they differ only in the `target:` overridden by each service.
x-build: &build-common
  context: .
  dockerfile: Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
  args:
    COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-rmhstudios}
    # Base image for the runner-full stage. Defaults to the `runner` stage (so a
    # plain `compose build` is self-contained); the deploy sets WEB_IMAGE to the
    # already-built slim web image tag when building `supervisor`, so runner-full
    # starts FROM that image and doesn't re-run the vite build. The `web` service
    # (target runner) doesn't reference it, so carrying it here is harmless.
    WEB_IMAGE: ${WEB_IMAGE:-runner}
    DATABASE_URL: ${DATABASE_URL}
    BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    VITE_BETTER_AUTH_URL: ${VITE_BETTER_AUTH_URL}
    VITE_SOCKET_URL: ${VITE_SOCKET_URL}
    VITE_RMHBOX_SOCKET_URL: ${VITE_RMHBOX_SOCKET_URL}
    VITE_RMHTUBE_SOCKET_URL: ${VITE_RMHTUBE_SOCKET_URL}
    VITE_DISCORD_ACTIVITY_CLIENT_ID: ${VITE_DISCORD_ACTIVITY_CLIENT_ID}
    VITE_CDN_BASE_URL: ${VITE_CDN_BASE_URL}
    # Used at build time to auto-generate library covers/metadata for new
    # PDFs. Optional — covers still render without it (titles fall back).
    DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}

services:
  # ─── Vite/Nitro Web App ─────────────────────────────────────────────────────
  web:
    <<: *common
    # Slim image (no Chromium / git / Go binaries). image: comes from *common
    # (${COMPOSE_PROJECT_NAME}-app:latest) and is shared by socket/rmhbox/rmhtube.
    build:
      <<: *build-common
      target: runner
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-web
    # NOTE: web does NOT publish a fixed host port. It is deployed blue/green by
    # deploy/hotswap-web.sh (zero-downtime), which publishes the active port
    # (7005 blue / 7015 green) itself and flips Apache between them. deploy.sh
    # brings the rest of the stack up with `--scale web=0` so compose never
    # recreates web in place (the old cause of the Cloudflare 520 during deploy).
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - PORT=${PORT_WEB:-7005}
      - HOSTNAME=0.0.0.0
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_WEB:-7005}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Socket.IO Server (games, real-time apps) ──────────────────────────────
  socket:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-socket
    ports:
      - "127.0.0.1:${PORT_SOCKET:-7001}:${PORT_SOCKET:-7001}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - SOCKET_PORT=${PORT_SOCKET:-7001}
    command: ["node", "dist-server/server/socket-server/index.cjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_SOCKET:-7001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── RMHbox WebSocket Server ────────────────────────────────────────────────
  rmhbox:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-rmhbox
    ports:
      - "127.0.0.1:${PORT_RMHBOX:-7676}:${PORT_RMHBOX:-7676}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - RMHBOX_PORT=${PORT_RMHBOX:-7676}
    command: ["node", "dist-server/server/rmhbox/index.cjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_RMHBOX:-7676}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── RmhTube WebSocket Server ──────────────────────────────────────────────
  rmhtube:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-rmhtube
    ports:
      - "127.0.0.1:${PORT_RMHTUBE:-7003}:${PORT_RMHTUBE:-7003}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - RMHTUBE_PORT=${PORT_RMHTUBE:-7003}
    command: ["node", "dist-server/server/rmhtube/index.cjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_RMHTUBE:-7003}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Ladder Worker (RMHLadder job-discovery cron) ──────────────────────────
  # Node cron process: self-bootstraps an empty DB (seed → probe → run), then
  # runs the pipeline on LADDER_CRON_SCHEDULE (default every 4h). No port.
  ladder-worker:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-ladder-worker
    env_file: ${ENV_FILE:-.env.production}
    command: ["node", "dist-server/server/ladder-worker/index.cjs"]

  # ─── Homes Worker (RMHHomes external-listing scraper cron) ─────────────────
  # Node cron process: self-bootstraps an empty DB (seed sources → scrape), then
  # aggregates public housing feeds on HOMES_CRON_SCHEDULE (default every 6h).
  # No port. Disable entirely with HOMES_SCRAPE_ENABLED=false.
  homes-worker:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-homes-worker
    env_file: ${ENV_FILE:-.env.production}
    command: ["node", "dist-server/server/homes-worker/index.cjs"]

  # ─── Go Supervisor (discord-bot + recap + doctrine-worker + vibe-worker + bot-worker) ─
  # Runs the five background workers as goroutines in a single Go process.
  # Env union: every variable the five old Node services needed is carried here.
  # The active Go discord-bot does not perform Git operations and needs no host
  # repository access. The shared db/ mount from *common is sufficient.
  # stop_grace_period: 90s = max of discord-bot (90s) and vibe-worker (30s) so
  #   in-flight AI requests and Chromium captures both get time to finish.
  supervisor:
    <<: *common
    # Full image: Go binaries + Chromium (vibe-worker chromedp).
    # This service carries the `runner-full` build; `status` reuses the image it
    # produces. Overrides the slim image: from *common.
    image: ${COMPOSE_PROJECT_NAME:-rmhstudios}-app-full:latest
    build:
      <<: *build-common
      target: runner-full
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-supervisor
    env_file: ${ENV_FILE:-.env.production}
    environment:
      # recap worker's internal HTTP port (doctrine / vibe-worker idles if absent)
      - RECAP_PORT=${PORT_RECAP:-7004}
      # Merged /metrics + /health endpoint for all five workers (httpx.ServeMetrics).
      # Templated so the healthcheck below stays in sync with the bind port.
      - METRICS_ADDR=:${PORT_SUPERVISOR_METRICS:-9090}
    command: ["/app/bin/supervisor"]
    restart: unless-stopped
    # discord-bot needs 90s for in-flight AI; vibe-worker needs 30s for Chromium
    stop_grace_period: 90s
    # Supervisor serves /health on METRICS_ADDR (default :9090). This restores
    # the health signal the removed recap service had. start_period covers the
    # db-wait (WaitForReachable: up to 10 tries × 5s = 50s) before the metrics
    # server comes up.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_SUPERVISOR_METRICS:-9090}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Status Page (status.rmhstudios.com) ───────────────────────────────────
  # Standalone health dashboard. Probes the website via its PUBLIC URL (so the
  # status reflects the real user path through Apache/DNS, not just a live
  # container) and the internal services by compose DNS name. Serves an HTML +
  # JSON status page; Apache proxies status.rmhstudios.com to the loopback port
  # published below.
  status:
    <<: *common
    # Runs the Go /app/bin/status binary, so it uses the full image (built by the
    # supervisor service above). Overrides the slim image: from *common.
    image: ${COMPOSE_PROJECT_NAME:-rmhstudios}-app-full:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-status
    ports:
      - "127.0.0.1:${PORT_STATUS:-7008}:${PORT_STATUS:-7008}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - STATUS_PORT=${PORT_STATUS:-7008}
      # Public origin every user-facing probe goes through (DNS → Cloudflare →
      # Apache → service), so the dashboard reflects real reachability rather than
      # internal container health. The website row hits "/" here; the realtime
      # hubs are probed at <origin>/socket/health, /rmhbox-ws/health and
      # /rmhtube-ws/health — Apache rewrites those to each service's /health (see
      # deploy/apache/rmhstudios.conf). cmd/status derives the origin from
      # STATUS_WEBSITE_URL, so this one value configures them all (e.g. point it
      # at the staging host on the staging stack).
      - STATUS_WEBSITE_URL=${STATUS_WEBSITE_URL:-https://rmhstudios.com/}
      # The Go assets origin runs under compose (service `assets` below) but sits
      # behind the public CDN, so it has no public path — probe it on internal
      # compose DNS. Keep the port in sync with the assets service.
      - ASSETS_PORT=${PORT_ASSETS:-7007}
      # Gateway and RMHmusic are k3s-only (not run under compose), so their
      # STATUS_*_URL is intentionally left unset — cmd/status omits those rows
      # rather than probing a service that isn't here.
      # Uptime history persists to the shared db/ volume (mounted at /app/db).
      - STATUS_DATA_DIR=/app/db
    command: ["/app/bin/status"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_STATUS:-7008}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Assets (streams /library /music /models /sprites from object storage) ──
  # Go port of the Apache-off-disk static CDN for the heavy media prefixes. In
  # the production/Helm topology the gateway proxies those four prefixes here;
  # in compose the main user path still goes through web/Apache, so this service
  # is for local dev/smoke-testing — hit it directly on the published port
  # (e.g. curl -r 0-1023 http://127.0.0.1:7007/models/<key> → 206). It reads
  # from the same S3-compatible bucket as bot-worker (S3_* from env_file; locally
  # S3_ENDPOINT points at the minio service below), so it waits for minio.
  assets:
    <<: *common
    # Runs the Go /app/bin/assets binary, so it uses the full image (built by the
    # supervisor service's runner-full build). Overrides the slim image: from *common.
    image: ${COMPOSE_PROJECT_NAME:-rmhstudios}-app-full:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-assets
    ports:
      - "127.0.0.1:${PORT_ASSETS:-7007}:${PORT_ASSETS:-7007}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - ASSETS_PORT=${PORT_ASSETS:-7007}
    command: ["/app/bin/assets"]
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_ASSETS:-7007}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Redis (distributed limits, cache, and realtime fan-out) ───────────────
  redis:
    image: redis:7.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-redis
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    tmpfs:
      - /data:size=256m,mode=0700
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      # Fail closed: no default credential fallback. Both must be supplied via
      # the environment (.env) or `docker compose up` aborts — never ship a
      # working default root password.
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ${MINIO_DATA_PATH:-./minio-data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── MinIO bucket bootstrap (creates the bucket, then exits) ────────────────
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set} ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set} &&
      mc mb --ignore-existing local/${S3_BUCKET:-rmh-media} &&
      echo 'bucket ready';
      "
    restart: "no"
