# ─────────────────────────────────────────────────────────────────────────────
# rmhstudios.com — Docker Compose
#
# Used for BOTH production and staging via --project-name and --env-file:
#
#   Production:  docker compose -p rmhstudios-prod  --env-file .env.production  up -d
#   Staging:     docker compose -p rmhstudios-staging --env-file .env.staging   up -d
#
# Port assignments are set in the respective .env files:
#   Production:  7005 / 7001 / 7676 / 7003
#   Staging:     8005 / 8001 / 8676 / 8003
#
# A single image (rmhstudios-app) is built once by the `web` service and
# shared by all other services — no redundant rebuilds.
#
# All four application services start independently in parallel for faster
# deployment. No artificial dependency ordering.
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  image: ${COMPOSE_PROJECT_NAME:-rmhstudios}-app:latest
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${STORAGE_PATH:-./db}:/app/db
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ─── Vite/Nitro Web App ─────────────────────────────────────────────────────
  web:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-rmhstudios}
        DATABASE_URL: ${DATABASE_URL}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL}
        VITE_BETTER_AUTH_URL: ${VITE_BETTER_AUTH_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_RMHBOX_SOCKET_URL: ${VITE_RMHBOX_SOCKET_URL}
        VITE_RMHTUBE_SOCKET_URL: ${VITE_RMHTUBE_SOCKET_URL}
        VITE_DISCORD_ACTIVITY_CLIENT_ID: ${VITE_DISCORD_ACTIVITY_CLIENT_ID}
        # Used at build time to auto-generate library covers/metadata for new
        # PDFs. Optional — covers still render without it (titles fall back).
        DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-web
    # NOTE: web does NOT publish a fixed host port. It is deployed blue/green by
    # deploy/hotswap-web.sh (zero-downtime), which publishes the active port
    # (7005 blue / 7015 green) itself and flips Apache between them. deploy.sh
    # brings the rest of the stack up with `--scale web=0` so compose never
    # recreates web in place (the old cause of the Cloudflare 520 during deploy).
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - PORT=${PORT_WEB:-7005}
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_WEB:-7005}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Socket.IO Server (games, real-time apps) ──────────────────────────────
  socket:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-socket
    ports:
      - "127.0.0.1:${PORT_SOCKET:-7001}:${PORT_SOCKET:-7001}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - SOCKET_PORT=${PORT_SOCKET:-7001}
    command: ["node", "dist-server/server/socket-server/index.cjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_SOCKET:-7001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── RMHbox WebSocket Server ────────────────────────────────────────────────
  rmhbox:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-rmhbox
    ports:
      - "127.0.0.1:${PORT_RMHBOX:-7676}:${PORT_RMHBOX:-7676}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - RMHBOX_PORT=${PORT_RMHBOX:-7676}
    command: ["node", "dist-server/server/rmhbox/index.cjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_RMHBOX:-7676}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── RmhTube WebSocket Server ──────────────────────────────────────────────
  rmhtube:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-rmhtube
    ports:
      - "127.0.0.1:${PORT_RMHTUBE:-7003}:${PORT_RMHTUBE:-7003}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - RMHTUBE_PORT=${PORT_RMHTUBE:-7003}
    command: ["node", "dist-server/server/rmhtube/index.cjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_RMHTUBE:-7003}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Go Supervisor (discord-bot + recap + doctrine-worker + vibe-worker + bot-worker) ─
  # Runs the five background workers as goroutines in a single Go process.
  # Env union: every variable the five old Node services needed is carried here.
  # Volumes union: db/ (from *common) + RMHBOT_REPO_PATH (needed by discord-bot
  #   for RMHBot git operations).
  # stop_grace_period: 90s = max of discord-bot (90s) and vibe-worker (30s) so
  #   in-flight AI requests and Chromium captures both get time to finish.
  supervisor:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-supervisor
    env_file: ${ENV_FILE:-.env.production}
    # Override volumes to add the repo mount required by the discord-bot worker
    # (RMHBot git operations). The db/ mount comes from *common but must be
    # repeated here because volumes: overrides the anchor.
    volumes:
      - ${STORAGE_PATH:-./db}:/app/db
      - ${RMHBOT_REPO_PATH:-/home/rmhstudios/rmhstudios.com}:${RMHBOT_REPO_PATH:-/home/rmhstudios/rmhstudios.com}
    environment:
      # recap worker's internal HTTP port (doctrine / vibe-worker idles if absent)
      - RECAP_PORT=${PORT_RECAP:-7004}
    command: ["/app/bin/supervisor"]
    restart: unless-stopped
    # discord-bot needs 90s for in-flight AI; vibe-worker needs 30s for Chromium
    stop_grace_period: 90s

  # FALLBACK (Node): five individual background-worker services — restore by
  # removing or disabling the `supervisor` block above and un-commenting below.
  #
  # ─── Discord Bot (slash commands + RMHBot AI editor) ──────────────────────
  # discord-bot:
  #   <<: *common
  #   container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-discord-bot
  #   env_file: ${ENV_FILE:-.env.production}
  #   # Override volumes to add repo mount for RMHBot git operations
  #   volumes:
  #     - ${STORAGE_PATH:-./db}:/app/db
  #     - ${RMHBOT_REPO_PATH:-/home/rmhstudios/rmhstudios.com}:${RMHBOT_REPO_PATH:-/home/rmhstudios/rmhstudios.com}
  #   command: ["node", "dist-server/server/discord-bot/index.cjs"]
  #   restart: unless-stopped
  #   # Allow in-flight AI requests (up to 2 min) to finish before force-kill
  #   stop_grace_period: 90s
  #
  # ─── Lights Out Recap Runner ───────────────────────────────────────────────
  # recap:
  #   <<: *common
  #   container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-recap
  #   env_file: ${ENV_FILE:-.env.production}
  #   environment:
  #     - RECAP_PORT=${PORT_RECAP:-7004}
  #   command: ["node", "dist-server/server/recap/index.cjs"]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:${PORT_RECAP:-7004}/"]
  #     interval: 60s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s
  #
  # ─── Doctrine Engine Worker (puzzle gen, reputation decay, Sahur activation) ─
  # doctrine-worker:
  #   <<: *common
  #   container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-doctrine-worker
  #   env_file: ${ENV_FILE:-.env.production}
  #   command: ["node", "dist-server/server/doctrine-worker/index.cjs"]
  #   restart: unless-stopped
  #
  # ─── RMHVibe Thumbnail Worker (renders gallery screenshots via headless Chromium) ─
  # vibe-worker:
  #   <<: *common
  #   container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-vibe-worker
  #   env_file: ${ENV_FILE:-.env.production}
  #   command: ["node", "dist-server/server/vibe-worker/index.cjs"]
  #   restart: unless-stopped
  #   # Chromium captures can outlive a quick SIGTERM; give them room to finish.
  #   stop_grace_period: 30s
  #
  # ─── RMHark Bot Worker (generates synthetic users + posts via DeepSeek) ─
  # bot-worker:
  #   <<: *common
  #   container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-bot-worker
  #   env_file: ${ENV_FILE:-.env.production}
  #   command: ["node", "dist-server/server/bot-worker/index.cjs"]
  #   restart: unless-stopped

  # ─── Status Page (status.rmhstudios.com) ───────────────────────────────────
  # Standalone health dashboard. Probes the website via its PUBLIC URL (so the
  # status reflects the real user path through Apache/DNS, not just a live
  # container) and the internal services by compose DNS name. Serves an HTML +
  # JSON status page; Apache proxies status.rmhstudios.com to the loopback port
  # published below.
  status:
    <<: *common
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-status
    ports:
      - "127.0.0.1:${PORT_STATUS:-7008}:${PORT_STATUS:-7008}"
    env_file: ${ENV_FILE:-.env.production}
    environment:
      - STATUS_PORT=${PORT_STATUS:-7008}
      # Public origin the website probe hits (DNS → Apache → active container).
      - STATUS_WEBSITE_URL=${STATUS_WEBSITE_URL:-https://rmhstudios.com/}
      - PORT_SOCKET=${PORT_SOCKET:-7001}
      - PORT_RMHBOX=${PORT_RMHBOX:-7676}
      - PORT_RMHTUBE=${PORT_RMHTUBE:-7003}
      - PORT_RECAP=${PORT_RECAP:-7004}
      # Uptime history persists to the shared db/ volume (mounted at /app/db).
      - STATUS_DATA_DIR=/app/db
    # FALLBACK (Node): command: ["node", "dist-server/server/status/index.cjs"]
    command: ["/app/bin/status"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT_STATUS:-7008}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID:-rmhminio}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY:-rmhminio-dev-secret}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ${MINIO_DATA_PATH:-./minio-data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── MinIO bucket bootstrap (creates the bucket, then exits) ────────────────
  minio-init:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME:-rmhstudios}-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-rmhminio} ${S3_SECRET_ACCESS_KEY:-rmhminio-dev-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-rmh-media} &&
      echo 'bucket ready';
      "
    restart: "no"

